name: Shadow Issue Sync (Reusable)

# Syncs issues from a source repo into a shadow repo.
# Reads .shadow/config.json for source_repo and issueMap.
# Upserts: create new shadow issues, update existing ones, close if source closed.

on:
  workflow_call:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true
      autoqueue_enabled:
        description: 'When true, AUTOFIX: Ready is stamped on shadow issues where the source issue also has it'
        type: string
        required: false
        default: 'false'
    outputs:
      issues_synced:
        description: 'Number of issues synced'
        value: ${{ jobs.sync.outputs.issues_synced }}

  workflow_dispatch:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true
      autoqueue_enabled:
        description: 'When true, stamp AUTOFIX: Ready on shadow issues where source has it'
        type: string
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    outputs:
      issues_synced: ${{ steps.sync.outputs.issues_synced }}

    steps:
      - name: Sync issues
        id: sync
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const [shadowOwner, shadowRepoName] = '${{ inputs.shadow_repo }}'.split('/');

            // ── 1. Read .shadow/config.json ──────────────────────────────────
            let config, configSha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: shadowOwner,
                repo: shadowRepoName,
                path: '.shadow/config.json',
              });
              configSha = data.sha;
              config = JSON.parse(Buffer.from(data.content, 'base64').toString());
            } catch (e) {
              core.setFailed(`.shadow/config.json not found in ${shadowOwner}/${shadowRepoName}: ${e.message}`);
              return;
            }

            const sourceRepo = config.sourceRepo;
            const [sourceOwner, sourceRepoName] = sourceRepo.split('/');
            const issueMap = config.issueMap || {};
            console.log(`Syncing from ${sourceRepo} → ${shadowOwner}/${shadowRepoName}`);
            console.log(`Existing issueMap entries: ${Object.keys(issueMap).length}`);

            // ── 2. Ensure required labels exist in shadow repo ───────────────
            const ensureLabel = async (name, color = 'ededed', description = '') => {
              try {
                await github.rest.issues.getLabel({ owner: shadowOwner, repo: shadowRepoName, name });
              } catch (e) {
                if (e.status === 404) {
                  try {
                    await github.rest.issues.createLabel({ owner: shadowOwner, repo: shadowRepoName, name, color, description });
                  } catch (ce) { /* may already exist from concurrent run */ }
                }
              }
            };
            await ensureLabel('shadow', '0075ca', 'Issue mirrored from an external source repo');
            await ensureLabel('AUTOFIX: Ready', '2da44e', 'Opt-in automated fix trigger for shadow issues');
            await ensureLabel('autopilot', '5319e7', 'PR created by autopilot runner');

            // ── 3. Fetch all issues from source (paginated) ──────────────────
            let page = 1, allIssues = [];
            while (true) {
              const { data } = await github.rest.issues.listForRepo({
                owner: sourceOwner,
                repo: sourceRepoName,
                state: 'all',
                per_page: 100,
                page,
              });
              if (!data.length) break;
              // Filter out pull requests
              allIssues.push(...data.filter(i => !i.pull_request));
              if (data.length < 100) break;
              page++;
            }
            console.log(`Fetched ${allIssues.length} issues from ${sourceRepo}`);

            // ── 4. Upsert each issue in shadow ───────────────────────────────
            const AUTOQUEUE_ENABLED = '${{ inputs.autoqueue_enabled }}' === 'true';
            // Labels that indicate a shadow issue is already being processed — do not
            // re-stamp AUTOFIX: Ready if any of these are present.
            const processingLabels = new Set([
              'AUTOFIX: Ready', 'STATUS: In Progress', 'STATUS: In QA',
              'STATUS: Follow-Up Required', 'claude-working',
            ]);
            // Autopilot lifecycle labels — sync must never strip these.
            // Removing and re-adding them fires labeled events that re-trigger intake.
            const preservedShadowLabels = new Set([
              'claude-working',
              'AUTOFIX: Ready', 'AUTOPILOT: Skip',
              'STATUS: In Progress', 'STATUS: In QA', 'STATUS: Follow-Up Required',
            ]);

            let created = 0, updated = 0, preservedClosed = 0;
            let shadowOpenCount = 0, shadowClosedCount = 0;
            for (let i = 0; i < allIssues.length; i++) {
              const src = allIssues[i];
              const shadowFooter = `\n\n---\n*Shadow of [${sourceRepo}#${src.number}](${src.html_url})*`;
              const body = (src.body || '') + shadowFooter;
              const title = src.title;
              const sourceState = src.state;
              let effectiveState = sourceState;

              // Mirror source labels, always add shadow marker.
              // AUTOFIX: Ready is NOT blindly mirrored — it is stamped conditionally
              // below based on AUTOQUEUE_ENABLED and shadow issue state.
              const sourceLabels = src.labels.map(l => l.name);
              const sourceHasAutofix = sourceLabels.includes('AUTOFIX: Ready');
              const filteredSourceLabels = sourceLabels.filter(l => l !== 'AUTOFIX: Ready');
              let labels = [...new Set([...filteredSourceLabels, 'shadow'])];

              // Ensure all mirrored source labels exist in shadow
              for (const lbl of filteredSourceLabels) {
                await ensureLabel(lbl);
              }

              const shadowNumber = issueMap[String(src.number)];

              if (shadowNumber) {
                const { data: shadowIssue } = await github.rest.issues.get({
                  owner: shadowOwner,
                  repo: shadowRepoName,
                  issue_number: shadowNumber,
                });
                const currentShadowLabels = shadowIssue.labels.map(l => typeof l === 'string' ? l : l.name);
                labels = [...new Set([
                  ...labels,
                  ...currentShadowLabels.filter(name => preservedShadowLabels.has(name)),
                ])];

                // Stamp AUTOFIX: Ready when:
                //   - source issue has AUTOFIX: Ready
                //   - AUTOQUEUE_ENABLED is true
                //   - shadow issue is open and not already in a processing state
                const shadowAlreadyProcessing = currentShadowLabels.some(l => processingLabels.has(l));
                if (sourceHasAutofix && AUTOQUEUE_ENABLED && sourceState === 'open' && !shadowAlreadyProcessing) {
                  labels = [...new Set([...labels, 'AUTOFIX: Ready'])];
                  console.log(`Stamping AUTOFIX: Ready on shadow issue #${shadowNumber} (autoqueue enabled)`);
                }

                // Preserve a completed shadow issue while the source issue remains
                // open and is waiting on upstream review/merge.
                if (shadowIssue.state === 'closed' && sourceState === 'open') {
                  effectiveState = 'closed';
                  preservedClosed++;
                }

                // Only update when something actually changed.
                // Passing `labels` in the payload fires labeled events for every label
                // in the array — omit it when labels haven't changed.
                const currentLabelSet = new Set(currentShadowLabels);
                const desiredLabelSet = new Set(labels);
                const labelsChanged =
                  currentLabelSet.size !== desiredLabelSet.size ||
                  [...desiredLabelSet].some(l => !currentLabelSet.has(l)) ||
                  [...currentLabelSet].some(l => !desiredLabelSet.has(l));
                const metaChanged =
                  shadowIssue.title !== title ||
                  shadowIssue.body !== body ||
                  shadowIssue.state !== effectiveState;

                if (metaChanged || labelsChanged) {
                  await github.rest.issues.update({
                    owner: shadowOwner,
                    repo: shadowRepoName,
                    issue_number: shadowNumber,
                    title,
                    body,
                    state: effectiveState,
                    ...(labelsChanged ? { labels } : {}),
                  });
                  updated++;
                }
              } else {
                // Create new shadow issue — stamp AUTOFIX: Ready immediately if source has
                // it and autoqueue is enabled (issue is inherently open at creation time).
                if (sourceHasAutofix && AUTOQUEUE_ENABLED && sourceState === 'open') {
                  labels = [...new Set([...labels, 'AUTOFIX: Ready'])];
                  console.log(`Stamping AUTOFIX: Ready on new shadow issue for source #${src.number} (autoqueue enabled)`);
                }

                const { data: created_issue } = await github.rest.issues.create({
                  owner: shadowOwner,
                  repo: shadowRepoName,
                  title,
                  body,
                  labels,
                });
                issueMap[String(src.number)] = created_issue.number;

                if (sourceState === 'closed') {
                  await github.rest.issues.update({
                    owner: shadowOwner,
                    repo: shadowRepoName,
                    issue_number: created_issue.number,
                    state: 'closed',
                  });
                }
                created++;
              }

              if (effectiveState === 'closed') {
                shadowClosedCount++;
              } else {
                shadowOpenCount++;
              }

              // Rate limit mitigation: sleep 1s every 30 upserts
              if ((i + 1) % 30 === 0) {
                await new Promise(r => setTimeout(r, 1000));
              }
            }

            const totalSynced = allIssues.length;
            const sourceOpenCount = allIssues.filter(i => i.state === 'open').length;
            const sourceClosedCount = totalSynced - sourceOpenCount;
            console.log(`Created: ${created}, Updated: ${updated}, Preserved closed: ${preservedClosed}`);

            // ── 5. Write back updated config.json ────────────────────────────
            const updatedConfig = {
              ...config,
              lastSyncAt: new Date().toISOString(),
              syncStats: {
                totalSynced,
                open: shadowOpenCount,
                closed: shadowClosedCount,
                sourceOpen: sourceOpenCount,
                sourceClosed: sourceClosedCount,
                preservedClosed,
              },
              issueMap,
            };

            await github.rest.repos.createOrUpdateFileContents({
              owner: shadowOwner,
              repo: shadowRepoName,
              path: '.shadow/config.json',
              sha: configSha,
              message: `chore: shadow sync [${totalSynced} issues, +${created} new]`,
              content: Buffer.from(JSON.stringify(updatedConfig, null, 2)).toString('base64'),
            });

            core.setOutput('issues_synced', totalSynced);
            console.log(`Sync complete. ${totalSynced} issues total.`);

            // ── Summary ──────────────────────────────────────────────────────
            const summary = [
              `### Shadow Sync: ${sourceRepo} → ${shadowOwner}/${shadowRepoName}`,
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Source issues | ${totalSynced} |`,
              `| Created | ${created} |`,
              `| Updated | ${updated} |`,
              `| Shadow open | ${shadowOpenCount} |`,
              `| Shadow closed | ${shadowClosedCount} |`,
              `| Source open | ${sourceOpenCount} |`,
              `| Source closed | ${sourceClosedCount} |`,
              `| Preserved closed shadow issues | ${preservedClosed} |`,
            ].join('\n');
            await core.summary.addRaw(summary).write();
