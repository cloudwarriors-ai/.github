name: Secret Scan

on:
  workflow_call:
    inputs:
      base_ref:
        description: 'Base ref to compare against'
        type: string
        default: 'HEAD~1'
      fail_on_secrets:
        description: 'Fail the workflow if secrets are found'
        type: boolean
        default: true
      scan_mode:
        description: 'Scan mode (diff, full)'
        type: string
        default: 'diff'
    outputs:
      secrets_found:
        description: 'Whether secrets were found'
        value: ${{ jobs.scan.outputs.secrets_found }}
      findings_count:
        description: 'Number of findings'
        value: ${{ jobs.scan.outputs.findings_count }}
      report:
        description: 'Scan report summary'
        value: ${{ jobs.scan.outputs.report }}

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      secrets_found: ${{ steps.scan.outputs.secrets_found }}
      findings_count: ${{ steps.scan.outputs.findings_count }}
      report: ${{ steps.scan.outputs.report }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.18.1"
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Create gitleaks config
        run: |
          cat > /tmp/gitleaks.toml << 'EOF'
          title = "Custom Gitleaks Config"

          # Extend the default config
          [extend]
          useDefault = true

          # Additional rules for this project
          [[rules]]
          id = "anthropic-api-key"
          description = "Anthropic API Key"
          regex = '''sk-ant-[a-zA-Z0-9-_]{32,}'''
          tags = ["api-key", "anthropic"]

          [[rules]]
          id = "openrouter-api-key"
          description = "OpenRouter API Key"
          regex = '''sk-or-[a-zA-Z0-9-_]{32,}'''
          tags = ["api-key", "openrouter"]

          [[rules]]
          id = "browserbase-api-key"
          description = "Browserbase API Key"
          regex = '''bb_[a-zA-Z0-9-_]{32,}'''
          tags = ["api-key", "browserbase"]

          # Allowlist for false positives
          [allowlist]
          paths = [
            '''\.github/workflows/.*\.yml$''',
            '''package-lock\.json$''',
            '''\.env\.example$''',
          ]
          regexTarget = "match"
          regexes = [
            '''EXAMPLE_.*=''',
            '''YOUR_.*_HERE''',
            '''<your-.*>''',
          ]
          EOF

      - name: Run secret scan
        id: scan
        run: |
          SCAN_MODE="${{ inputs.scan_mode }}"
          BASE_REF="${{ inputs.base_ref }}"

          FINDINGS_FILE="/tmp/gitleaks-findings.json"
          REPORT_FILE="/tmp/gitleaks-report.txt"

          set +e

          if [ "$SCAN_MODE" = "diff" ]; then
            echo "🔍 Scanning changes since $BASE_REF..."
            gitleaks detect --source . --log-opts "$BASE_REF..HEAD" --config /tmp/gitleaks.toml --report-format json --report-path "$FINDINGS_FILE" 2>&1 | tee "$REPORT_FILE"
          else
            echo "🔍 Scanning entire repository..."
            gitleaks detect --source . --config /tmp/gitleaks.toml --report-format json --report-path "$FINDINGS_FILE" 2>&1 | tee "$REPORT_FILE"
          fi

          EXIT_CODE=$?
          set -e

          # Parse results
          if [ -f "$FINDINGS_FILE" ] && [ -s "$FINDINGS_FILE" ]; then
            FINDINGS_COUNT=$(python3 -c "import json; print(len(json.load(open('$FINDINGS_FILE'))))" 2>/dev/null || echo "0")
          else
            FINDINGS_COUNT=0
          fi

          echo "findings_count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FINDINGS_COUNT" -gt 0 ]; then
            echo "secrets_found=true" >> "$GITHUB_OUTPUT"
            echo "::error::Found $FINDINGS_COUNT potential secret(s) in the changes!"

            # Generate report summary
            python3 << 'PYTHON_EOF'
          import json
          import os

          try:
              with open('/tmp/gitleaks-findings.json', 'r') as f:
                  findings = json.load(f)

              report_lines = ["## Secret Scan Results", "", f"**{len(findings)} potential secret(s) found:**", ""]

              for i, finding in enumerate(findings[:10], 1):  # Limit to first 10
                  rule = finding.get('RuleID', 'unknown')
                  file = finding.get('File', 'unknown')
                  line = finding.get('StartLine', '?')
                  # Don't include the actual secret!
                  report_lines.append(f"{i}. **{rule}** in `{file}` (line {line})")

              if len(findings) > 10:
                  report_lines.append(f"... and {len(findings) - 10} more")

              report = "\n".join(report_lines)

              # Write to output (escape for JSON)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"report<<EOF_REPORT\n{report}\nEOF_REPORT\n")

              print(report)

          except Exception as e:
              print(f"Error generating report: {e}")
          PYTHON_EOF

          else
            echo "secrets_found=false" >> "$GITHUB_OUTPUT"
            echo "report=No secrets found" >> "$GITHUB_OUTPUT"
            echo "✅ No secrets found"
          fi

          # Fail if configured to do so
          if [ "${{ inputs.fail_on_secrets }}" = "true" ] && [ "$FINDINGS_COUNT" -gt 0 ]; then
            exit 1
          fi

      - name: Upload findings
        if: always() && steps.scan.outputs.secrets_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-findings
          path: /tmp/gitleaks-findings.json
          retention-days: 7
