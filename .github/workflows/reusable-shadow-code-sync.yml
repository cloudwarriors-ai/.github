name: Shadow Code Sync (Reusable)

# Keeps a shadow repo's default branch in parity with the source repo
# while preserving CloudWarriors shadow control-plane files.

on:
  workflow_call:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true

  workflow_dispatch:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true

concurrency:
  group: shadow-code-sync-${{ inputs.shadow_repo }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve repo metadata
        id: meta
        uses: actions/github-script@v7
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const [shadowOwner, shadowRepoName] = '${{ inputs.shadow_repo }}'.split('/');

            const { data: configFile } = await github.rest.repos.getContent({
              owner: shadowOwner,
              repo: shadowRepoName,
              path: '.shadow/config.json',
            });
            const config = JSON.parse(Buffer.from(configFile.content, 'base64').toString());
            const [sourceOwner, sourceRepoName] = config.sourceRepo.split('/');

            const { data: shadowRepo } = await github.rest.repos.get({
              owner: shadowOwner,
              repo: shadowRepoName,
            });
            const { data: sourceRepo } = await github.rest.repos.get({
              owner: sourceOwner,
              repo: sourceRepoName,
            });

            const workflowRef = process.env.WORKFLOW_REF || '';
            const workflowRepoRef = workflowRef.includes('@')
              ? workflowRef.split('@')[1]
                  .replace('refs/heads/', '')
                  .replace('refs/tags/', '')
              : 'main';

            const branchSync = config.branchSync || [
              { source: sourceRepo.default_branch, shadow: shadowRepo.default_branch }
            ];

            core.setOutput('source_repo', config.sourceRepo);
            core.setOutput('source_default_branch', sourceRepo.default_branch);
            core.setOutput('shadow_default_branch', shadowRepo.default_branch);
            core.setOutput('workflow_repo_ref', workflowRepoRef || 'main');
            core.setOutput('branch_sync_json', JSON.stringify(branchSync));

            console.log(`Branch sync pairs: ${JSON.stringify(branchSync)}`);

      - name: Fetch shadow control-plane templates
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const { data: pipelineFile } = await github.rest.repos.getContent({
              owner: 'cloudwarriors-ai',
              repo: '.github',
              path: 'workflow-templates/cloudwarriors-shadow-pipeline.yml',
              ref: 'main',
            });
            fs.writeFileSync(
              '/tmp/shadow-caller.yml',
              Buffer.from(pipelineFile.content, 'base64').toString('utf8')
            );

            const { data: runnerFile } = await github.rest.repos.getContent({
              owner: 'cloudwarriors-ai',
              repo: '.github',
              path: 'workflow-templates/shadow-autopilot-runner.yml',
              ref: 'main',
            });
            fs.writeFileSync(
              '/tmp/shadow-autopilot-runner.yml',
              Buffer.from(runnerFile.content, 'base64').toString('utf8')
            );

      - name: Sync source code into shadow branches
        id: sync
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          SHADOW_REPO: ${{ inputs.shadow_repo }}
          SOURCE_REPO: ${{ steps.meta.outputs.source_repo }}
          BRANCH_SYNC_JSON: ${{ steps.meta.outputs.branch_sync_json }}
        run: |
          set -euo pipefail
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude-bot@anthropic.com"

          ANY_CHANGED=false

          # Parse branch pairs and sync each one
          node -e "
            JSON.parse(process.env.BRANCH_SYNC_JSON).forEach(p =>
              process.stdout.write(p.source + ':' + p.shadow + '\n')
            );
          " | while IFS=':' read -r SOURCE_BRANCH SHADOW_BRANCH; do
            echo "=== Syncing ${SOURCE_REPO}:${SOURCE_BRANCH} → ${SHADOW_REPO}:${SHADOW_BRANCH} ==="

            # Clone shadow branch (create if missing)
            if git clone --no-tags --branch "$SHADOW_BRANCH" \
                "https://x-access-token:${WORKFLOW_PAT}@github.com/${SHADOW_REPO}.git" \
                "shadow-${SHADOW_BRANCH}" 2>/dev/null; then
              echo "Cloned existing shadow branch ${SHADOW_BRANCH}"
            else
              git clone --no-tags \
                "https://x-access-token:${WORKFLOW_PAT}@github.com/${SHADOW_REPO}.git" \
                "shadow-${SHADOW_BRANCH}"
              git -C "shadow-${SHADOW_BRANCH}" checkout -b "$SHADOW_BRANCH" \
                || git -C "shadow-${SHADOW_BRANCH}" checkout "$SHADOW_BRANCH"
              echo "Created new shadow branch ${SHADOW_BRANCH}"
            fi

            # Clone source at the specified branch
            git clone --depth=1 --branch "$SOURCE_BRANCH" \
              "https://x-access-token:${WORKFLOW_PAT}@github.com/${SOURCE_REPO}.git" \
              "source-${SOURCE_BRANCH}"

            rsync -a --delete \
              --exclude '.git/' \
              --exclude '.shadow/' \
              --exclude '.github/workflows/claude-ci.yml' \
              --exclude '.github/workflows/autopilot-intake.yml' \
              --exclude '.github/workflows/autopilot-runner.yml' \
              --exclude '.github/workflows/daily-dev-health.yml' \
              "source-${SOURCE_BRANCH}/" "shadow-${SHADOW_BRANCH}/"

            mkdir -p "shadow-${SHADOW_BRANCH}/.github/workflows"
            cp /tmp/shadow-caller.yml "shadow-${SHADOW_BRANCH}/.github/workflows/claude-ci.yml"
            cp /tmp/shadow-autopilot-runner.yml "shadow-${SHADOW_BRANCH}/.github/workflows/autopilot-runner.yml"

            cd "shadow-${SHADOW_BRANCH}"
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "chore: shadow code sync [${SOURCE_BRANCH}]"
              git pull --rebase origin "$SHADOW_BRANCH"
              git push origin "$SHADOW_BRANCH"
              ANY_CHANGED=true
              echo "Synced ${SHADOW_BRANCH}"
            else
              echo "No changes for ${SHADOW_BRANCH}"
            fi
            cd ..
          done

          if [ "$ANY_CHANGED" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger runtime detection after code sync
        if: steps.sync.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'cloudwarriors-ai',
              repo: '.github',
              workflow_id: 'reusable-shadow-detect-runtime.yml',
              ref: 'main',
              inputs: {
                shadow_repo: '${{ inputs.shadow_repo }}',
                shadow_repo_ref: '${{ steps.meta.outputs.shadow_default_branch }}',
              },
            });

            console.log(
              `Triggered runtime detection for ${{ inputs.shadow_repo }} ` +
              `on ${{ steps.meta.outputs.shadow_default_branch }}`
            );

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const changed = '${{ steps.sync.outputs.changed }}' === 'true';
            await core.summary
              .addRaw([
                `### Shadow Code Sync`,
                ``,
                `**Shadow repo:** ${{ inputs.shadow_repo }}`,
                `**Source repo:** ${{ steps.meta.outputs.source_repo }}`,
                `**Changed:** ${changed ? 'yes' : 'no'}`,
              ].join('\n'))
              .write();
