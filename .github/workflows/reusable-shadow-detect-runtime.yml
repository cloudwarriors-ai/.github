name: Shadow Runtime Detection (Reusable)

# Generates .shadow/runtime.yml for a shadow repo by detecting its stack
# and asking Claude to produce a CI environment spec.
# Run once at shadow creation, or on-demand to regenerate.

on:
  workflow_call:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true
      shadow_repo_ref:
        description: 'Branch to commit runtime.yml to'
        type: string
        default: 'main'

  workflow_dispatch:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true
      shadow_repo_ref:
        description: 'Branch to commit runtime.yml to'
        type: string
        default: 'main'

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout shadow repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.shadow_repo }}
          token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.shadow_repo_ref }}

      - name: Gather stack signals
        id: signals
        run: |
          python3 << 'PYEOF'
          import json, os

          def read_safe(path, max_lines=None):
              if not os.path.exists(path):
                  return None
              with open(path, errors='replace') as f:
                  lines = f.readlines()
              if max_lines:
                  lines = lines[:max_lines]
              return ''.join(lines)

          def package_json_summary():
              raw = read_safe('package.json')
              if not raw:
                  return None
              try:
                  pkg = json.loads(raw)
                  return {
                      'scripts': pkg.get('scripts', {}),
                      'dependency_names': sorted(pkg.get('dependencies', {}).keys()),
                      'dev_dependency_names': sorted(pkg.get('devDependencies', {}).keys()),
                      'engines': pkg.get('engines', {}),
                  }
              except Exception:
                  return {'raw': raw[:500]}

          signals = {
              'package_json': package_json_summary(),
              'firebase_json': read_safe('firebase.json'),
              'env_example': read_safe('.env.example') or read_safe('.env.local.example'),
              'playwright_config': read_safe('playwright.config.ts') or read_safe('playwright.config.js'),
              'vitest_config': read_safe('vitest.config.ts') or read_safe('vitest.config.js'),
              'docker_compose': read_safe('docker-compose.yml') or read_safe('compose.yml'),
              'dockerfile': read_safe('Dockerfile', max_lines=40),
              'requirements_txt': read_safe('requirements.txt', max_lines=60),
              'pyproject_toml': read_safe('pyproject.toml', max_lines=40),
              'gemfile': read_safe('Gemfile', max_lines=40),
              'go_mod': read_safe('go.mod', max_lines=20),
              'readme': read_safe('README.md', max_lines=80),
              'existing_shadow_config': read_safe('.shadow/config.json'),
              'existing_runtime': read_safe('.shadow/runtime.yml'),
          }

          # Filter out None values to keep prompt tight
          signals = {k: v for k, v in signals.items() if v is not None}

          with open('/tmp/stack-signals.json', 'w') as f:
              json.dump(signals, f, indent=2)

          print(f"Signals gathered: {list(signals.keys())}")
          PYEOF

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest --prefer-offline 2>/dev/null || npm install -g @anthropic-ai/claude-code@latest

      - name: Build detection prompt
        run: |
          SHADOW_REPO='${{ inputs.shadow_repo }}'
          cat > /tmp/detect-prompt.md << 'PROMPTEOF'
          You are a CI runtime configuration generator for shadow repositories used for autonomous AI bug fixing.

          Given the stack signals below, generate a `.shadow/runtime.yml` file that describes how to spin up this application for CI integration testing.

          ## Output Format

          Output ONLY the YAML content between these exact markers, nothing else before or after:
          ---START_YAML---
          <yaml content here>
          ---END_YAML---

          ## Schema (all fields required unless noted)

          ```yaml
          schema_version: "1"
          generated_at: "<ISO timestamp>"

          stack:
            framework: <nextjs|express|fastapi|rails|django|flask|unknown>
            language: <typescript|javascript|python|ruby|go|unknown>
            package_manager: <npm|pnpm|yarn|pip|bundler|go>
            node_version: "<string>"  # omit entirely for non-js/ts projects
            python_version: "<string>"  # omit entirely for non-python projects

          services:   # background processes needed before tests; use [] if none required
            - name: <descriptive-name>
              start_command: "<shell command to start service>"
              health_checks:
                - name: <check-name>
                  url: "http://localhost:<port>"
                  expected_status: 200
                  timeout_seconds: 60
              failure_mode: <degraded|fatal>
              # degraded: unit tests still run if this service fails
              # fatal: entire test run fails if this service is unhealthy

          commands:
            install: "<command>"
            lint: "<command or empty string to skip>"
            test_unit: "<command for fast unit tests needing NO services, or empty to skip>"
            test_e2e: "<command for e2e/integration tests needing services, or empty to skip>"
            build: "<command or empty string to skip>"
            seed: "<command to seed test data after services start, or empty to skip>"

          env:
            defaults:       # injected for ALL runs; use emulator endpoints or fake/demo values ONLY
              KEY: "value"
            ci_overrides:   # injected only in CI; omit section if empty
              KEY: "value"

          secrets:
            required: []    # GitHub secret names; run fails if absent
            optional:       # GitHub secret names; passed through if present, tests skip gracefully if absent
              - SECRET_NAME
          ```

          ## Generation Rules

          1. **Firebase projects**: Read `firebase.json` for emulator ports. Set `FIRESTORE_EMULATOR_HOST`, `FIREBASE_AUTH_EMULATOR_HOST`, `FIREBASE_STORAGE_EMULATOR_HOST` in `env.defaults` pointing at those ports. Generate fake/demo values for all `NEXT_PUBLIC_FIREBASE_*` vars.

          2. **test_unit**: Must run without any background services. For Next.js + vitest: use `npm run test:run`. For Python: `pytest -x --ignore=e2e` or `pytest src/`. For Rails: `rails test`.

          3. **test_e2e**: Use the Playwright/Cypress/Selenium command. If `playwright.config.ts` has a `webServer` block, the dev server auto-starts — no separate service needed. Use `npm run test:e2e` or equivalent.

          4. **services failure_mode**: Use `degraded` for Firebase emulators (unit tests can still run if emulators fail). Use `fatal` for databases that unit tests also require.

          5. **secrets.optional**: Any var from `.env.example` that maps to an external paid API (Anthropic, Stripe, Zoom, Resend, Twilio, etc.) goes here.

          6. **env.defaults**: Use emulator hostnames for Firebase. Use `demo-shadow` as the Firebase project ID. Never put real credentials or production URLs in defaults.

          7. **build command**: For Next.js, only include if the project actually builds without external services. If build requires live DB/API, use empty string.

          8. If the stack cannot be determined, use `framework: unknown`, `services: []`, and leave `test_unit` and `test_e2e` empty.

          ## Stack Signals

          PROMPTEOF

          echo "" >> /tmp/detect-prompt.md
          echo '```json' >> /tmp/detect-prompt.md
          cat /tmp/stack-signals.json >> /tmp/detect-prompt.md
          echo '' >> /tmp/detect-prompt.md
          echo '```' >> /tmp/detect-prompt.md

          echo "Prompt ready ($(wc -l < /tmp/detect-prompt.md) lines)"

      - name: Generate runtime config with Claude
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          touch /tmp/claude-output.txt
          echo "Running Claude stack detection..."
          set +e
          timeout 300 claude --print --permission-mode bypassPermissions \
            --model claude-sonnet-4-6 \
            "$(cat /tmp/detect-prompt.md)" > /tmp/claude-output.txt 2>&1
          EXIT=$?
          set -e
          echo "claude_exit=$EXIT" >> "$GITHUB_OUTPUT"
          echo "Claude exit code: $EXIT"
          if [ $EXIT -ne 0 ]; then
            echo "::warning::Claude detection failed or timed out; falling back to deterministic runtime generation"
            cat /tmp/claude-output.txt || true
          else
            echo "Claude output ($(wc -l < /tmp/claude-output.txt) lines)"
          fi

      - name: Extract and validate runtime.yml
        id: validate
        run: |
          python3 << 'PYEOF'
          import re, yaml, json
          from datetime import datetime, timezone
          from pathlib import Path

          def read_text(path):
              p = Path(path)
              if not p.exists():
                  return ''
              return p.read_text(errors='replace')

          def read_json(path):
              raw = read_text(path)
              if not raw:
                  return {}
              try:
                  return json.loads(raw)
              except json.JSONDecodeError:
                  return {}

          def normalize_shell(cmd):
              return cmd.replace('source ', '. ')

          def detect_playwright_services(playwright_text):
              services = []
              pattern = re.compile(r'command:\s*"([^"]+)"\s*,\s*url:\s*([^,\n]+)', re.S)
              for idx, (raw_command, raw_url) in enumerate(pattern.findall(playwright_text), start=1):
                  command = normalize_shell(raw_command.strip())
                  url_expr = raw_url.strip()
                  if 'backendUrl' in url_expr:
                      url = 'http://localhost:8000/api/v1/vendors/'
                  elif 'frontendUrl' in url_expr:
                      url = 'http://localhost:3000'
                  else:
                      url = url_expr.strip('`"\' ')

                  if 'manage.py runserver' in command:
                      name = 'django'
                  elif 'uvicorn' in command:
                      name = 'extraction'
                  elif 'npm run dev' in command or 'next dev' in command:
                      name = 'frontend'
                  else:
                      name = f'service-{idx}'

                  services.append({
                      'name': name,
                      'start_command': command,
                      'health_checks': [{
                          'name': 'ready',
                          'url': url,
                          'expected_status': 200,
                          'timeout_seconds': 60,
                      }],
                      'failure_mode': 'fatal',
                  })
              return services

          package_json = read_json('package.json')
          scripts = package_json.get('scripts', {})
          dependency_names = set(package_json.get('dependencies', {}).keys()) | set(package_json.get('devDependencies', {}).keys())
          playwright_text = read_text('playwright.config.ts') or read_text('playwright.config.js')
          global_setup_text = read_text('e2e/global-setup.ts') or read_text('e2e/global-setup.js')
          has_package_lock = Path('package-lock.json').exists()
          has_manage_py = Path('service/manage.py').exists()
          has_service_requirements = Path('service/requirements.txt').exists()
          has_extraction_requirements = Path('service/apps/extraction/requirements.txt').exists()
          has_ensure_e2e_admin = any(Path('service').glob('**/management/commands/ensure_e2e_admin.py')) if Path('service').exists() else False

          def fallback_cfg(reason):
              framework = 'unknown'
              if 'next' in dependency_names:
                  framework = 'nextjs'
              elif has_manage_py:
                  framework = 'django'

              if Path('tsconfig.json').exists() or Path('playwright.config.ts').exists() or Path('vitest.config.ts').exists():
                  language = 'typescript'
              elif package_json:
                  language = 'javascript'
              elif has_manage_py:
                  language = 'python'
              else:
                  language = 'unknown'

              package_manager = 'npm' if (package_json or has_package_lock) else 'pip' if has_manage_py else 'unknown'

              stack = {
                  'framework': framework,
                  'language': language,
                  'package_manager': package_manager,
              }
              if package_json or has_package_lock:
                  stack['node_version'] = package_json.get('engines', {}).get('node', '22')
              if has_manage_py:
                  stack['python_version'] = '3.11'

              lint_cmd = 'npm run lint' if 'lint' in scripts else ''
              if 'test:unit' in scripts:
                  unit_cmd = 'npm run test:unit'
              elif 'test:run' in scripts:
                  unit_cmd = 'npm run test:run'
              elif 'test' in scripts:
                  unit_cmd = 'npm test'
              elif has_manage_py:
                  unit_cmd = 'pytest --tb=no -q'
              else:
                  unit_cmd = ''

              if 'build' in scripts:
                  build_cmd = 'npm run build'
              else:
                  build_cmd = ''

              if 'test:e2e' in scripts:
                  e2e_cmd = 'npm run test:e2e'
              elif playwright_text:
                  e2e_cmd = 'npx playwright test --project=smoke'
              else:
                  e2e_cmd = ''

              print(f'::warning::{reason}; using deterministic runtime fallback')
              return {
                  'schema_version': '1',
                  'generated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
                  'stack': stack,
                  'services': [],
                  'commands': {
                      'install': '',
                      'lint': lint_cmd,
                      'test_unit': unit_cmd,
                      'test_e2e': e2e_cmd,
                      'build': build_cmd,
                      'seed': '',
                  },
                  'env': {
                      'defaults': {},
                      'ci_overrides': {},
                  },
                  'secrets': {
                      'required': [],
                      'optional': [],
                  },
              }

          # Extract YAML between markers
          content = read_text('/tmp/claude-output.txt')
          required = ['schema_version', 'stack', 'services', 'commands', 'env', 'secrets']
          required_cmds = ['install', 'lint', 'test_unit', 'test_e2e', 'build', 'seed']
          cfg = None
          match = re.search(r'---START_YAML---\n(.*?)---END_YAML---', content, re.DOTALL) if content else None
          if match:
              yaml_content = match.group(1)
              try:
                  candidate = yaml.safe_load(yaml_content) or {}
                  missing_keys = [k for k in required if k not in candidate]
                  missing_cmds = [k for k in required_cmds if k not in candidate.get('commands', {})]
                  if missing_keys or missing_cmds:
                      reason = 'Claude output missing required runtime schema keys'
                      if missing_keys:
                          reason += f" top-level={missing_keys}"
                      if missing_cmds:
                          reason += f" commands={missing_cmds}"
                      cfg = fallback_cfg(reason)
                  else:
                      cfg = candidate
              except yaml.YAMLError as e:
                  cfg = fallback_cfg(f'Generated runtime.yml failed YAML parse: {e}')
          else:
              cfg = fallback_cfg('Claude output did not contain runtime YAML markers')

          # Deterministic enrichment for common full-stack shadow repos.
          defaults = cfg.setdefault('env', {}).setdefault('defaults', {})
          ci_overrides = cfg.setdefault('env', {}).setdefault('ci_overrides', {})
          commands = cfg.setdefault('commands', {})
          validation = cfg.setdefault('validation', {})

          if has_manage_py and has_service_requirements:
              install_parts = ['npm ci' if has_package_lock else 'npm install']
              install_parts.append('python -m venv service/.venv')
              install_parts.append('service/.venv/bin/pip install -r service/requirements.txt')
              if has_extraction_requirements:
                  install_parts.append('service/.venv/bin/pip install -r service/apps/extraction/requirements.txt')
              if 'playwright' in playwright_text.lower() or 'playwright' in commands.get('test_e2e', '').lower():
                  install_parts.append('npx playwright install chromium --with-deps')
              commands['install'] = ' && '.join(install_parts)

          if has_manage_py:
              defaults.setdefault('DJANGO_DEBUG', '1')
              defaults.setdefault('DISABLE_THROTTLING', '1')
              defaults.setdefault('API_BASE_URL', 'http://127.0.0.1:8000/api/v1')

          if has_extraction_requirements:
              defaults.setdefault('NEXT_PUBLIC_EXTRACTION_URL', 'http://localhost:9000')

          detected_services = detect_playwright_services(playwright_text)
          if detected_services:
              cfg['services'] = detected_services
              if any(s['name'] == 'frontend' for s in detected_services):
                  defaults.setdefault('E2E_FRONTEND_URL', 'http://localhost:3000')
              if any(s['name'] == 'django' for s in detected_services):
                  defaults.setdefault('E2E_BACKEND_URL', 'http://localhost:8000')

          if has_manage_py and has_ensure_e2e_admin:
              defaults['E2E_EMAIL'] = 'e2e-admin@cloudwarriors.com'
              defaults['E2E_PASSWORD'] = 'E2eAdmin123!'
              ci_overrides['E2E_EMAIL'] = defaults['E2E_EMAIL']
              ci_overrides['E2E_PASSWORD'] = defaults['E2E_PASSWORD']
              ci_overrides.pop('E2E_USERNAME', None)
              commands['seed'] = '(cd service && DJANGO_E2E_ENABLED=true .venv/bin/python manage.py migrate --noinput && DJANGO_E2E_ENABLED=true .venv/bin/python manage.py ensure_e2e_admin --email "$E2E_EMAIL" --password "$E2E_PASSWORD")'
          elif has_manage_py:
              commands['seed'] = '(cd service && .venv/bin/python manage.py migrate --noinput)'

          if commands.get('test_e2e') and (has_ensure_e2e_admin or 'ensure_e2e_admin' in global_setup_text):
              validation['block_e2e'] = True

          ci_overrides.setdefault('CI', 'true')

          # Write validated file
          with open('/tmp/runtime.yml', 'w') as f:
              f.write(yaml.safe_dump(cfg, sort_keys=False))

          print(f"Validation passed. Stack: {cfg['stack']}")
          print(f"Services: {[s['name'] for s in cfg.get('services', [])]}")
          cmds = cfg.get('commands', {})
          print(f"Commands: install={cmds.get('install','')!r}, unit={cmds.get('test_unit','')!r}, e2e={cmds.get('test_e2e','')!r}, seed={cmds.get('seed','')!r}")
          print(f"Validation: block_e2e={cfg.get('validation', {}).get('block_e2e', False)!r}")
          PYEOF

      - name: Commit runtime.yml to shadow repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const [owner, repo] = '${{ inputs.shadow_repo }}'.split('/');
            const ref = '${{ inputs.shadow_repo_ref }}';

            const content = fs.readFileSync('/tmp/runtime.yml', 'utf8');
            const encoded = Buffer.from(content).toString('base64');

            // Check if file already exists (need SHA to update)
            let existingSha = null;
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: '.shadow/runtime.yml', ref,
              });
              existingSha = data.sha;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const params = {
              owner, repo,
              path: '.shadow/runtime.yml',
              message: 'ci: generate .shadow/runtime.yml [auto-detected stack]',
              content: encoded,
              branch: ref,
            };
            if (existingSha) params.sha = existingSha;

            const result = await github.rest.repos.createOrUpdateFileContents(params);
            console.log(`Committed .shadow/runtime.yml: ${result.data.content.sha}`);

            // Write summary
            await core.summary
              .addRaw(`### Runtime Config Generated\n\n**Repo:** ${{ inputs.shadow_repo }}\n\n\`\`\`yaml\n${content.slice(0, 1500)}\n\`\`\``)
              .write();
