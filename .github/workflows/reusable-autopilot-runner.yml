name: "Reusable Autopilot: Runner"

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: string
      issue_title:
        description: 'Issue title (for context)'
        required: false
        type: string
        default: ''
      track:
        description: 'Track: bugs or features'
        required: true
        type: string
      base:
        description: 'Base branch'
        required: true
        type: string
      head:
        description: 'Head branch (autofix/issue-<id>)'
        required: true
        type: string
      max_claude_turns:
        description: 'Max turns for Claude in RLM'
        required: false
        type: number
        default: 10
      max_rlm_cost:
        description: 'Max cost for RLM codebase analysis ($)'
        required: false
        type: number
        default: 2
    secrets:
      WORKFLOW_PAT:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      OPENROUTER_API_KEY:
        required: true
      VALIDATION_ATTESTATION_KEY:
        required: false
      E2E_EMAIL:
        required: false
      E2E_PASSWORD:
        required: false
      DATABASE_URL:
        required: false
      PII_ENCRYPTION_KEY:
        required: false
      PII_HMAC_KEY:
        required: false

concurrency:
  group: autopilot-runner-${{ inputs.issue_number }}-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # ── Job 1: Call RLM fix engine ──────────────────────────────────────
  rlm-fix:
    name: "RLM Fix (#${{ inputs.issue_number }})"
    uses: cloudwarriors-ai/workflows/.github/workflows/reusable-claude-autofix-rlm.yml@main
    with:
      issue_number: ${{ fromJSON(inputs.issue_number) }}
      head: ${{ inputs.head }}
      base: ${{ inputs.base }}
      max_claude_turns: ${{ inputs.max_claude_turns }}
      max_rlm_cost: ${{ inputs.max_rlm_cost }}
    secrets: inherit

  # ── Job 2: Read project config ──────────────────────────────────────
  read-config:
    name: "Read Config"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      config_json: ${{ steps.config.outputs.config_json }}
      build_command: ${{ steps.config.outputs.build_command }}
      lint_command: ${{ steps.config.outputs.lint_command }}
      test_command: ${{ steps.config.outputs.test_command }}
      app_test_command: ${{ steps.config.outputs.app_test_command }}
      db_migrate_command: ${{ steps.config.outputs.db_migrate_command }}
      health_endpoint: ${{ steps.config.outputs.health_endpoint }}
      preview_deploy: ${{ steps.config.outputs.preview_deploy }}
      auto_merge: ${{ steps.config.outputs.auto_merge }}
      runtime: ${{ steps.config.outputs.runtime }}
      python_version: ${{ steps.config.outputs.python_version }}
      python_requirements: ${{ steps.config.outputs.python_requirements }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Read .autopilot/config.json
        id: config
        run: |
          if [ -f .autopilot/config.json ]; then
            CONFIG=$(cat .autopilot/config.json)
            echo "config_json<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFIG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "build_command=$(echo "$CONFIG" | jq -r '.buildCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "lint_command=$(echo "$CONFIG" | jq -r '.lintCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "test_command=$(echo "$CONFIG" | jq -r '.testCommand // ""')" >> "$GITHUB_OUTPUT"
            # Multi-line command (may contain && or newlines) — emit via heredoc.
            APP_TEST_CMD=$(echo "$CONFIG" | jq -r '.appTestCommand // ""')
            echo "app_test_command<<APP_TEST_EOF" >> "$GITHUB_OUTPUT"
            echo "$APP_TEST_CMD" >> "$GITHUB_OUTPUT"
            echo "APP_TEST_EOF" >> "$GITHUB_OUTPUT"
            echo "db_migrate_command=$(echo "$CONFIG" | jq -r '.dbMigrateCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "health_endpoint=$(echo "$CONFIG" | jq -r '.healthEndpoint // "/api/v1/health"')" >> "$GITHUB_OUTPUT"
            echo "preview_deploy=$(echo "$CONFIG" | jq -r '.previewDeploy // false')" >> "$GITHUB_OUTPUT"
            echo "auto_merge=$(echo "$CONFIG" | jq -r '.mergeRequirements.autoMerge // false')" >> "$GITHUB_OUTPUT"
            echo "runtime=$(echo "$CONFIG" | jq -r '.runtime // ""')" >> "$GITHUB_OUTPUT"
            echo "python_version=$(echo "$CONFIG" | jq -r '.pythonVersion // "3.11"')" >> "$GITHUB_OUTPUT"
            echo "python_requirements=$(echo "$CONFIG" | jq -r '.pythonRequirements // "service/requirements.txt"')" >> "$GITHUB_OUTPUT"
          else
            echo "No .autopilot/config.json found — using defaults" >&2
            echo "config_json={}" >> "$GITHUB_OUTPUT"
            echo "build_command=" >> "$GITHUB_OUTPUT"
            echo "lint_command=" >> "$GITHUB_OUTPUT"
            echo "test_command=" >> "$GITHUB_OUTPUT"
            echo "app_test_command=" >> "$GITHUB_OUTPUT"
            echo "db_migrate_command=" >> "$GITHUB_OUTPUT"
            echo "health_endpoint=/api/v1/health" >> "$GITHUB_OUTPUT"
            echo "preview_deploy=false" >> "$GITHUB_OUTPUT"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
            echo "runtime=" >> "$GITHUB_OUTPUT"
            echo "python_version=3.11" >> "$GITHUB_OUTPUT"
            echo "python_requirements=service/requirements.txt" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 3: Validate fix bundle ─────────────────────────────────────
  validate:
    name: "Validate (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      validation_passed: ${{ steps.validate.outputs.passed }}

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base if head not found
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch shared scripts
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/cloudwarriors-ai/.github.git /tmp/org-github

      - name: Validate issue bundle
        id: validate
        continue-on-error: true
        env:
          ISSUE_NUM: ${{ inputs.issue_number }}
          ISSUE_BASE: ${{ inputs.base }}
          ISSUE_TRACK: ${{ inputs.track }}
          ISSUE_HEAD: ${{ inputs.head }}
        run: |
          npx tsx /tmp/org-github/scripts/autopilot/validate-issue-bundle.ts \
            --issue "$ISSUE_NUM" \
            --base "$ISSUE_BASE" \
            --track "$ISSUE_TRACK" \
            --head "$ISSUE_HEAD"

          if [ $? -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 4: Preflight CI ────────────────────────────────────────────
  preflight:
    name: "Preflight (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      preflight_passed: ${{ steps.preflight.outputs.passed }}

    steps:
      - name: Checkout fix branch
        continue-on-error: true
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Run project preflight
        id: preflight
        continue-on-error: true
        run: |
          if [ -f .autopilot/preflight.sh ]; then
            chmod +x .autopilot/preflight.sh
            ./.autopilot/preflight.sh
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No .autopilot/preflight.sh — skipping"
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 5: Deploy preview container ────────────────────────────────
  deploy-preview:
    name: "Deploy Preview (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config, preflight]
    if: |
      needs.read-config.outputs.preview_deploy == 'true' &&
      needs.preflight.outputs.preflight_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.base == 'main' && 'production' || 'dev' }}

    outputs:
      preview_url:  ${{ steps.set-url.outputs.preview_url }}
      backend_url:  ${{ steps.set-url.outputs.backend_url }}
      # source_repo is set on shadow runs; empty on non-shadow. Used by validate-api
      # to point Sentinel's manifest checkout at the source repo (which has validation.json).
      source_repo:  ${{ steps.shadow-prep.outputs.source_repo }}

    steps:
      - name: Check kill switch
        if: vars.DEPLOY_ENABLED == 'false'
        run: |
          echo "Deploy disabled for this environment"
          exit 1

      - name: Push shadow fix to source repo for VPS deploy
        id: shadow-prep
        if: contains(github.repository, '-shadow')
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          BASE_BRANCH: ${{ inputs.base }}
          HEAD_BRANCH: ${{ inputs.head }}
        run: |
          set -euo pipefail
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude-bot@anthropic.com"

          SHADOW_REPO="${{ github.repository }}"
          SOURCE_REPO="${SHADOW_REPO%-shadow}"
          PREVIEW_BRANCH="shadow-preview/issue-${ISSUE_NUM}"

          # Clone source at base branch and create the preview branch
          git clone --no-tags --branch "$BASE_BRANCH" \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${SOURCE_REPO}.git" source
          git -C source checkout -b "$PREVIEW_BRANCH"

          # Fetch shadow fix branch and extract only application changes
          git clone --no-tags \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${SHADOW_REPO}.git" shadow
          git -C shadow diff --binary \
            "origin/${BASE_BRANCH}...origin/${HEAD_BRANCH}" \
            -- . \
            ':(exclude).shadow' \
            ':(exclude).github/workflows/claude-ci.yml' \
            ':(exclude).github/workflows/autopilot-runner.yml' \
            > /tmp/shadow-preview.patch

          if [ ! -s /tmp/shadow-preview.patch ]; then
            echo "::warning::No application changes found in shadow fix"
            echo "deploy_head=${BASE_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C source apply --index --3way /tmp/shadow-preview.patch
          git -C source commit -m "shadow-preview: autofix for issue #${ISSUE_NUM}"
          git -C source push origin "HEAD:${PREVIEW_BRANCH}" --force

          echo "deploy_head=${PREVIEW_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"
          echo "Pushed shadow diff → ${SOURCE_REPO}:${PREVIEW_BRANCH}"

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: GITHUB_TOKEN,DEPLOY_HEAD,DEPLOY_ISSUE,VPS_PATH,DATABASE_URL,E2E_EMAIL,E2E_PASSWORD,PII_ENCRYPTION_KEY,PII_HMAC_KEY
          script: |
            cd "$VPS_PATH"
            git fetch origin dev --depth 1
            git checkout origin/dev -- scripts/ .autopilot/
            "$VPS_PATH/scripts/preview-deploy.sh" "$DEPLOY_HEAD" "$DEPLOY_ISSUE"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          DEPLOY_HEAD: ${{ steps.shadow-prep.outputs.deploy_head || inputs.head }}
          DEPLOY_ISSUE: ${{ inputs.issue_number }}
          VPS_PATH: ${{ vars.VPS_REPO_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
          PII_HMAC_KEY: ${{ secrets.PII_HMAC_KEY }}

      - name: Set preview URL output
        id: set-url
        env:
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          PREVIEW_URL="https://preview-${ISSUE_NUM}.pscx.ai"
          # Use flat subdomain (preview-N-api) so the *.pscx.ai wildcard cert covers it;
          # preview-N.api.pscx.ai is 3rd-level and not covered by *.pscx.ai.
          BACKEND_URL="https://preview-${ISSUE_NUM}-api.pscx.ai"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "backend_url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Verify preview is reachable
        run: |
          HEALTH="${{ needs.read-config.outputs.health_endpoint }}"
          URL="${{ steps.set-url.outputs.preview_url }}${HEALTH}"
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "$URL" > /dev/null 2>&1; then
              echo "Preview reachable at $URL"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Preview not reachable at $URL"

      - name: Verify backend URL is reachable
        run: |
          HEALTH="${{ needs.read-config.outputs.health_endpoint }}"
          URL="${{ steps.set-url.outputs.backend_url }}${HEALTH}"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "Backend reachable at $URL (HTTP $STATUS)"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Backend not reachable at $URL after 180s — Sentinel may fail"

  # ── Job 6: Run tests ───────────────────────────────────────────────
  test:
    name: "Test (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview]
    if: always() && !cancelled() && needs.read-config.outputs.test_command != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      tests_passed: ${{ steps.result.outputs.tests_passed }}

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Setup Python
        if: needs.read-config.outputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.read-config.outputs.python_version }}
          cache: pip

      - name: Install Python dependencies
        if: needs.read-config.outputs.runtime == 'python'
        env:
          REQS: ${{ needs.read-config.outputs.python_requirements }}
        run: |
          if [ -f "$REQS" ]; then
            python -m pip install --upgrade pip
            pip install -r "$REQS"
          else
            echo "python requirements file not found at '$REQS' — skipping pip install" >&2
          fi

      - name: Run test command
        id: test
        continue-on-error: true
        env:
          TEST_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url || '' }}
        run: ${{ needs.read-config.outputs.test_command }}

      - name: Determine result
        id: result
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 7: Teardown preview ────────────────────────────────────────
  teardown-preview:
    name: "Teardown Preview (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview, test, validate-api, app-tests]
    if: always() && needs.deploy-preview.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.base == 'main' && 'production' || 'dev' }}

    steps:
      - name: Teardown preview on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_ISSUE,VPS_PATH
          script: |
            cd "$VPS_PATH"
            git fetch origin dev --depth 1
            git checkout origin/dev -- scripts/ .autopilot/
            "$VPS_PATH/scripts/preview-teardown.sh" "$DEPLOY_ISSUE"
        env:
          DEPLOY_ISSUE: ${{ inputs.issue_number }}
          VPS_PATH: ${{ vars.VPS_REPO_PATH }}

      - name: Delete shadow preview branch from source repo
        if: contains(github.repository, '-shadow')
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          SOURCE_REPO="${{ github.repository }}"
          SOURCE_REPO="${SOURCE_REPO%-shadow}"
          PREVIEW_BRANCH="shadow-preview/issue-${ISSUE_NUM}"
          git push \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${SOURCE_REPO}.git" \
            --delete "${PREVIEW_BRANCH}" 2>/dev/null || true
          echo "Cleaned up ${SOURCE_REPO}:${PREVIEW_BRANCH}"

  # ── Job 7.5: API-driven behavioral validation ──────────────────────
  # Runs Sentinel scenarios against the deployed preview. Emits a verdict
  # (unchanged | expected-diff | new-behavior | regression | skipped) and a
  # signed attestation that shadow-upstream-pr can verify without re-running.
  validate-api:
    name: "API Validate (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview]
    if: |
      always() && !cancelled() &&
      needs.deploy-preview.result == 'success' &&
      needs.deploy-preview.outputs.backend_url != ''
    uses: ./.github/workflows/reusable-validate.yml
    with:
      preview_url:   ${{ needs.deploy-preview.outputs.backend_url }}
      target_env:    ${{ inputs.base == 'main' && 'production' || 'dev' }}
      issue_number:  ${{ inputs.issue_number }}
      # For shadow runs, the validation manifest lives in the source repo, not the shadow.
      # source_repo is empty on non-shadow runs, so manifest_repo defaults to caller repo.
      manifest_repo: ${{ needs.deploy-preview.outputs.source_repo }}
      manifest_ref:  ${{ inputs.base }}
    secrets:
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
      VALIDATION_ATTESTATION_KEY: ${{ secrets.VALIDATION_ATTESTATION_KEY }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  # ── Job 7.6: Application test suite (advisory) ─────────────────────
  # Runs the app's own E2E/integration tests against the live preview.
  # Advisory — a failure surfaces in the PR body but does not gate merge.
  # Opt-in per app via `.autopilot/config.json → appTestCommand`.
  app-tests:
    name: "App Tests (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview]
    if: |
      always() && !cancelled() &&
      needs.deploy-preview.result == 'success' &&
      needs.read-config.outputs.app_test_command != ''
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      app_tests_passed: ${{ steps.result.outputs.app_tests_passed }}
      app_tests_has_regressions: ${{ steps.compare.outputs.has_regressions }}
      baseline_label: ${{ steps.compare.outputs.baseline_label }}

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Fetch shared scripts
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/cloudwarriors-ai/.github.git /tmp/org-github

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Install Playwright browsers
        run: |
          if [ -f package.json ] && grep -q '"@playwright/test"' package.json 2>/dev/null; then
            npx --yes playwright install --with-deps chromium
          fi

      - name: Setup Python
        if: needs.read-config.outputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.read-config.outputs.python_version }}
          cache: pip

      - name: Install Python dependencies
        if: needs.read-config.outputs.runtime == 'python'
        env:
          REQS: ${{ needs.read-config.outputs.python_requirements }}
        run: |
          if [ -f "$REQS" ]; then
            python -m pip install --upgrade pip
            pip install -r "$REQS"
          fi
          pip install httpx pytest pytest-asyncio

      - name: Run app test suite
        id: app-tests
        continue-on-error: true
        env:
          SENTINEL_BASE_URL: ${{ needs.deploy-preview.outputs.backend_url }}
          TEST_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          TEST_USER_EMAIL: ${{ secrets.E2E_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          BROWSERBASE_LOCAL: 'true'
          CI: 'true'
          APP_TEST_CMD: ${{ needs.read-config.outputs.app_test_command }}
        run: |
          set -o pipefail
          mkdir -p /tmp/app-tests
          echo "Running: $APP_TEST_CMD"
          bash -c "$APP_TEST_CMD" 2>&1 | tee /tmp/app-tests/run.log

      - name: Parse results
        id: result
        if: always()
        run: |
          if [ "${{ steps.app-tests.outcome }}" = "success" ]; then
            echo "app_tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare against baseline
        id: compare
        if: always()
        continue-on-error: true
        run: |
          STATIC_BASELINE="tests/sentinel/baseline.json"
          DAILY_SNAPSHOT="tests/sentinel/daily-snapshot.json"

          if [ ! -f /tmp/app-tests/pytest.xml ] || [ ! -f /tmp/app-tests/run.log ]; then
            echo "::warning::Run artifacts missing at /tmp/app-tests/ — skipping comparison"
            echo "has_regressions=false" >> "$GITHUB_OUTPUT"
            echo "has_report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Prefer daily-snapshot.json if it exists and is < 24 hours old.
          BASELINE_FILE=""
          BASELINE_LABEL=""
          if [ -f "$DAILY_SNAPSHOT" ]; then
            GENERATED_AT=$(python3 -c "import json,sys; d=json.load(open('$DAILY_SNAPSHOT')); print(d.get('generated_at',''))" 2>/dev/null || echo "")
            if [ -n "$GENERATED_AT" ]; then
              SNAPSHOT_AGE=$(python3 -c "from datetime import datetime,timezone; t=datetime.fromisoformat('${GENERATED_AT}'.replace('Z','+00:00')); print(int((datetime.now(timezone.utc)-t).total_seconds()))" 2>/dev/null || echo "999999")
              if [ "$SNAPSHOT_AGE" -lt 86400 ]; then
                SNAPSHOT_DATE=$(python3 -c "from datetime import datetime; t=datetime.fromisoformat('${GENERATED_AT}'.replace('Z','+00:00')); print(t.strftime('%Y-%m-%d %H:%M UTC'))" 2>/dev/null || echo "$GENERATED_AT")
                BASELINE_FILE="$DAILY_SNAPSHOT"
                BASELINE_LABEL="daily snapshot (${SNAPSHOT_DATE})"
                echo "::notice::Using daily snapshot from ${SNAPSHOT_DATE}"
              else
                SNAPSHOT_HOURS=$(( SNAPSHOT_AGE / 3600 ))
                echo "::warning::Daily snapshot is ${SNAPSHOT_HOURS}h old — falling back to static baseline"
              fi
            fi
          fi

          if [ -z "$BASELINE_FILE" ]; then
            if [ ! -f "$STATIC_BASELINE" ]; then
              echo "::notice::No baseline found — first run or baseline not yet committed"
              echo "has_regressions=false" >> "$GITHUB_OUTPUT"
              echo "has_report=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            STATIC_DATE=$(python3 -c "import json; d=json.load(open('$STATIC_BASELINE')); print(d.get('generated_at','unknown')[:10])" 2>/dev/null || echo "unknown")
            BASELINE_FILE="$STATIC_BASELINE"
            if [ -f "$DAILY_SNAPSHOT" ]; then
              BASELINE_LABEL="static baseline (${STATIC_DATE}) ⚠️ daily snapshot stale"
            else
              BASELINE_LABEL="static baseline (${STATIC_DATE})"
            fi
            echo "::notice::Using static baseline from ${STATIC_DATE}"
          fi

          python3 /tmp/org-github/scripts/autopilot/compare-app-tests.py \
            --baseline "$BASELINE_FILE" \
            --baseline-label "$BASELINE_LABEL" \
            --pytest-xml /tmp/app-tests/pytest.xml \
            --playwright-log /tmp/app-tests/run.log \
            --output /tmp/app-tests/regression-report.md \
            --step-summary "$GITHUB_STEP_SUMMARY" \
            --regressions-out /tmp/app-tests/has-regressions.txt
          echo "has_report=true" >> "$GITHUB_OUTPUT"
          HAS_REGS=$(cat /tmp/app-tests/has-regressions.txt)
          echo "has_regressions=${HAS_REGS}" >> "$GITHUB_OUTPUT"
          echo "baseline_label=${BASELINE_LABEL}" >> "$GITHUB_OUTPUT"

      - name: Post or update regression comment
        if: always() && steps.compare.outputs.has_regressions == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          HEAD_REF: ${{ inputs.head }}
          BASE_REF: ${{ inputs.base }}
        run: |
          set -euo pipefail
          PR=$(gh pr list --head "$HEAD_REF" --base "$BASE_REF" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR" ]; then
            echo "::notice::No open PR for head=$HEAD_REF base=$BASE_REF — regression comment skipped"
            exit 0
          fi
          MARKER="<!-- app-tests-regression-report -->"
          REPORT_BODY="$(cat /tmp/app-tests/regression-report.md)"
          BODY="$(printf '%s\n%s' "$MARKER" "$REPORT_BODY")"
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n 1 || echo "")
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING" \
              -f body="$BODY" >/dev/null
            echo "Updated existing regression comment (id=$EXISTING)"
          else
            gh pr comment "$PR" --body "$BODY"
            echo "Posted new regression comment on PR #$PR"
          fi

      - name: Upload app-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-tests-${{ inputs.issue_number }}
          path: |
            /tmp/app-tests/
            playwright-report/
            test-results/
          retention-days: 90
          if-no-files-found: ignore

  # ── Job 8: Upsert PR and update labels ─────────────────────────────
  finalize:
    name: "Finalize (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config, validate, preflight, test, validate-api, app-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch shared scripts
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/cloudwarriors-ai/.github.git /tmp/org-github

      - name: Build matrix
        if: always()
        id: matrix
        env:
          VALIDATION: ${{ needs.validate.outputs.validation_passed }}
          PREFLIGHT: ${{ needs.preflight.outputs.preflight_passed }}
          TESTS: ${{ needs.test.outputs.tests_passed || 'skip' }}
          API_VALIDATION: ${{ needs.validate-api.outputs.api_validation_passed || 'skip' }}
          API_VERDICT: ${{ needs.validate-api.outputs.verdict || 'skipped' }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          CONTRACT=$( [ "$VALIDATION" = "true" ] && echo "pass" || echo "fail" )
          INTEGRATION=$( [ "$PREFLIGHT" = "true" ] && echo "pass" || echo "fail" )

          npx tsx /tmp/org-github/scripts/autopilot/matrix.ts \
            --issue "$ISSUE_NUM" \
            --contract-result "$CONTRACT" \
            --integration-result "$INTEGRATION" \
            --e2e-result "$TESTS" \
            --smoke-result "skip" \
            --attempt 1 \
            --model "rlm"

      - name: Upsert PR
        if: |
          steps.checkout.outcome == 'success' &&
          needs.validate.outputs.validation_passed == 'true' &&
          needs.preflight.outputs.preflight_passed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          ISSUE_HEAD: ${{ inputs.head }}
          ISSUE_BASE: ${{ inputs.base }}
          ISSUE_TRACK: ${{ inputs.track }}
          TESTS_RESULT: ${{ needs.test.outputs.tests_passed || 'skipped' }}
          PREFLIGHT_RESULT: ${{ needs.preflight.outputs.preflight_passed || 'skipped' }}
          VALIDATION_RESULT: ${{ needs.validate.outputs.validation_passed || 'skipped' }}
          API_VALIDATION_RESULT: ${{ needs.validate-api.outputs.api_validation_passed || 'skipped' }}
          API_VERDICT: ${{ needs.validate-api.outputs.verdict || 'skipped' }}
          APP_TESTS_RESULT: ${{ needs.app-tests.outputs.app_tests_passed || 'skipped' }}
          APP_TESTS_REGRESSIONS: ${{ needs.app-tests.outputs.app_tests_has_regressions || 'n/a' }}
          APP_TESTS_BASELINE_LABEL: ${{ needs.app-tests.outputs.baseline_label || '' }}
        run: |
          EXISTING_PR=$(gh pr list --head "$ISSUE_HEAD" --base "$ISSUE_BASE" --json number --jq '.[0].number' 2>/dev/null || echo "")
          BACKEND_URL="https://preview-${ISSUE_NUM}-api.pscx.ai"

          # Enrich PR body — all fetches wrapped; failures degrade gracefully
          ISSUE_TITLE=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUM}" \
            --jq '.title // ""' 2>/dev/null || echo "")
          ISSUE_BODY_PREVIEW=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUM}" \
            --jq '(.body // "") | .[0:400]' 2>/dev/null || echo "")

          DIFF_TABLE=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${ISSUE_BASE}...${ISSUE_HEAD}" \
            --jq '[.files[] | "| \(.filename) | \(.status) | +\(.additions) | -\(.deletions) |"] | join("\n")' \
            2>/dev/null || echo "| _(unavailable)_ | | | |")
          DIFF_SUMMARY=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${ISSUE_BASE}...${ISSUE_HEAD}" \
            --jq '"\(.files | length) file(s) changed, \([.files[].additions] | add // 0) insertion(s), \([.files[].deletions] | add // 0) deletion(s)"' \
            2>/dev/null || echo "")

          COMMIT_MSG=$(git log --format="%b" -1 HEAD 2>/dev/null | \
            grep -v "^Co-Authored-By:" | sed '/^[[:space:]]*$/d' | head -20 || echo "")

          case "$API_VERDICT" in
            unchanged)     VERDICT_LABEL="no API change detected" ;;
            expected-diff) VERDICT_LABEL="expected API differences" ;;
            new-behavior)  VERDICT_LABEL="new endpoints/behavior added" ;;
            regression)    VERDICT_LABEL="regression detected" ;;
            skipped)       VERDICT_LABEL="skipped" ;;
            *)             VERDICT_LABEL="${API_VERDICT}" ;;
          esac

          if [ "$APP_TESTS_RESULT" = "skipped" ]; then
            APP_TESTS_GATE="skipped"
          elif [ "$APP_TESTS_REGRESSIONS" = "true" ]; then
            APP_TESTS_GATE="⚠️ regression vs ${APP_TESTS_BASELINE_LABEL:-baseline} — see PR comment"
          else
            APP_TESTS_GATE="✅ no regressions vs ${APP_TESTS_BASELINE_LABEL:-baseline}"
          fi

          PR_BODY="$(cat <<PRBODY
          ## Autopilot Fix for Issue #${ISSUE_NUM}

          **Track:** ${ISSUE_TRACK} | **Base:** ${ISSUE_BASE} | **Head:** ${ISSUE_HEAD}

          ### Issue
          **${ISSUE_TITLE}**

          ${ISSUE_BODY_PREVIEW}

          ### What Changed
          | File | Status | Additions | Deletions |
          |------|--------|-----------|-----------|
          ${DIFF_TABLE}

          ${DIFF_SUMMARY}

          ### Fix Description
          ${COMMIT_MSG}

          ### Validation Gates
          | Gate | Result |
          |------|--------|
          | Preflight | ${PREFLIGHT_RESULT} |
          | Bundle validation | ${VALIDATION_RESULT} |
          | Sentinel API — ${VERDICT_LABEL} | ${API_VALIDATION_RESULT} |
          | Unit tests | ${TESTS_RESULT} |
          | App tests (E2E) | ${APP_TESTS_GATE} |

          **Preview:** ${BACKEND_URL}
          [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

          ---
          Closes #${ISSUE_NUM}
          - [ ] Human review complete
          PRBODY
          )"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --head "$ISSUE_HEAD" \
              --base "$ISSUE_BASE" \
              --title "fix: resolve issue #${ISSUE_NUM}" \
              --body "$PR_BODY" \
              --label "autopilot") || true
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "")
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

      # --- Auto-merge if configured and all checks pass ---
      - name: Auto-merge
        if: |
          needs.read-config.outputs.auto_merge == 'true' &&
          needs.validate.outputs.validation_passed == 'true' &&
          needs.preflight.outputs.preflight_passed == 'true' &&
          (needs.test.outputs.tests_passed == 'true' || needs.test.outputs.tests_passed == '') &&
          (needs.validate-api.result == 'skipped' || needs.validate-api.outputs.api_validation_passed == 'true')
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          PR="${{ steps.pr.outputs.pr_number }}"
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --squash --auto || echo "Auto-merge failed — PR may need reviews"
          fi

      # --- Update issue labels ---
      - name: "On success: label In QA"
        if: |
          needs.validate.outputs.validation_passed == 'true' &&
          needs.preflight.outputs.preflight_passed == 'true' &&
          (needs.validate-api.result == 'skipped' || needs.validate-api.outputs.api_validation_passed == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }}, name: 'STATUS: In Progress',
              });
            } catch {}
            const inQaLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
            });
            if (!inQaLabels.data.some(l => l.name === 'STATUS: In QA')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }},
                labels: ['STATUS: In QA'],
              });
            }

      - name: "On failure: label Follow-Up Required"
        if: |
          needs.validate.outputs.validation_passed != 'true' ||
          needs.preflight.outputs.preflight_passed != 'true' ||
          (needs.validate-api.result != 'skipped' && needs.validate-api.outputs.api_validation_passed != 'true')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }}, name: 'STATUS: In Progress',
              });
            } catch {}
            const followUpLabels = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
            });
            if (!followUpLabels.data.some(l => l.name === 'STATUS: Follow-Up Required')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }},
                labels: ['STATUS: Follow-Up Required'],
              });
            }
            const followUpMarker = '<!-- AUTOPILOT_FOLLOWUP -->';
            const followUpBody = [
              followUpMarker,
              '### Autopilot — Follow-Up Required',
              '',
              `**Run:** [Workflow](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              'This issue needs human attention. Check the workflow logs for details.',
            ].join('\n');
            const followUpComments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }}, per_page: 50,
            });
            const existingFollowUp = followUpComments.data.find(c => c.body && c.body.includes(followUpMarker));
            if (existingFollowUp) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existingFollowUp.id, body: followUpBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }}, body: followUpBody,
              });
            }
