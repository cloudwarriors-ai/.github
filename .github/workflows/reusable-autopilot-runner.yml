name: "Reusable Autopilot: Runner"

on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: string
      issue_title:
        description: 'Issue title (for context)'
        required: false
        type: string
        default: ''
      track:
        description: 'Track: bugs or features'
        required: true
        type: string
      base:
        description: 'Base branch'
        required: true
        type: string
      head:
        description: 'Head branch (autofix/issue-<id>)'
        required: true
        type: string
      max_claude_turns:
        description: 'Max turns for Claude in RLM'
        required: false
        type: number
        default: 10
      max_rlm_cost:
        description: 'Max cost for RLM codebase analysis ($)'
        required: false
        type: number
        default: 2
    secrets:
      WORKFLOW_PAT:
        required: true
      ANTHROPIC_API_KEY:
        required: true
      OPENROUTER_API_KEY:
        required: true
      VALIDATION_ATTESTATION_KEY:
        required: false
      E2E_EMAIL:
        required: false
      E2E_PASSWORD:
        required: false
      DATABASE_URL:
        required: false

concurrency:
  group: autopilot-runner-${{ inputs.issue_number }}-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # ── Job 1: Call RLM fix engine ──────────────────────────────────────
  rlm-fix:
    name: "RLM Fix (#${{ inputs.issue_number }})"
    uses: cloudwarriors-ai/workflows/.github/workflows/reusable-claude-autofix-rlm.yml@main
    with:
      issue_number: ${{ fromJSON(inputs.issue_number) }}
      head: ${{ inputs.head }}
      base: ${{ inputs.base }}
      max_claude_turns: ${{ inputs.max_claude_turns }}
      max_rlm_cost: ${{ inputs.max_rlm_cost }}
    secrets: inherit

  # ── Job 2: Read project config ──────────────────────────────────────
  read-config:
    name: "Read Config"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      config_json: ${{ steps.config.outputs.config_json }}
      build_command: ${{ steps.config.outputs.build_command }}
      lint_command: ${{ steps.config.outputs.lint_command }}
      test_command: ${{ steps.config.outputs.test_command }}
      db_migrate_command: ${{ steps.config.outputs.db_migrate_command }}
      health_endpoint: ${{ steps.config.outputs.health_endpoint }}
      preview_deploy: ${{ steps.config.outputs.preview_deploy }}
      auto_merge: ${{ steps.config.outputs.auto_merge }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Read .autopilot/config.json
        id: config
        run: |
          if [ -f .autopilot/config.json ]; then
            CONFIG=$(cat .autopilot/config.json)
            echo "config_json<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFIG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "build_command=$(echo "$CONFIG" | jq -r '.buildCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "lint_command=$(echo "$CONFIG" | jq -r '.lintCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "test_command=$(echo "$CONFIG" | jq -r '.testCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "db_migrate_command=$(echo "$CONFIG" | jq -r '.dbMigrateCommand // ""')" >> "$GITHUB_OUTPUT"
            echo "health_endpoint=$(echo "$CONFIG" | jq -r '.healthEndpoint // "/api/v1/health"')" >> "$GITHUB_OUTPUT"
            echo "preview_deploy=$(echo "$CONFIG" | jq -r '.previewDeploy // false')" >> "$GITHUB_OUTPUT"
            echo "auto_merge=$(echo "$CONFIG" | jq -r '.mergeRequirements.autoMerge // false')" >> "$GITHUB_OUTPUT"
          else
            echo "No .autopilot/config.json found — using defaults" >&2
            echo "config_json={}" >> "$GITHUB_OUTPUT"
            echo "build_command=" >> "$GITHUB_OUTPUT"
            echo "lint_command=" >> "$GITHUB_OUTPUT"
            echo "test_command=" >> "$GITHUB_OUTPUT"
            echo "db_migrate_command=" >> "$GITHUB_OUTPUT"
            echo "health_endpoint=/api/v1/health" >> "$GITHUB_OUTPUT"
            echo "preview_deploy=false" >> "$GITHUB_OUTPUT"
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 3: Validate fix bundle ─────────────────────────────────────
  validate:
    name: "Validate (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      validation_passed: ${{ steps.validate.outputs.passed }}

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base if head not found
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch shared scripts
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/cloudwarriors-ai/.github.git /tmp/org-github

      - name: Validate issue bundle
        id: validate
        continue-on-error: true
        env:
          ISSUE_NUM: ${{ inputs.issue_number }}
          ISSUE_BASE: ${{ inputs.base }}
          ISSUE_TRACK: ${{ inputs.track }}
          ISSUE_HEAD: ${{ inputs.head }}
        run: |
          npx tsx /tmp/org-github/scripts/autopilot/validate-issue-bundle.ts \
            --issue "$ISSUE_NUM" \
            --base "$ISSUE_BASE" \
            --track "$ISSUE_TRACK" \
            --head "$ISSUE_HEAD"

          if [ $? -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 4: Preflight CI ────────────────────────────────────────────
  preflight:
    name: "Preflight (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      preflight_passed: ${{ steps.preflight.outputs.passed }}

    steps:
      - name: Checkout fix branch
        continue-on-error: true
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Run project preflight
        id: preflight
        continue-on-error: true
        run: |
          if [ -f .autopilot/preflight.sh ]; then
            chmod +x .autopilot/preflight.sh
            ./.autopilot/preflight.sh
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No .autopilot/preflight.sh — skipping"
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 5: Deploy preview container ────────────────────────────────
  deploy-preview:
    name: "Deploy Preview (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config, preflight]
    if: |
      needs.read-config.outputs.preview_deploy == 'true' &&
      needs.preflight.outputs.preflight_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.base == 'main' && 'production' || 'dev' }}

    outputs:
      preview_url: ${{ steps.set-url.outputs.preview_url }}

    steps:
      - name: Check kill switch
        if: vars.DEPLOY_ENABLED == 'false'
        run: |
          echo "Deploy disabled for this environment"
          exit 1

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          envs: GITHUB_TOKEN,DEPLOY_HEAD,DEPLOY_ISSUE,VPS_PATH,DATABASE_URL,E2E_EMAIL,E2E_PASSWORD
          script: |
            "$VPS_PATH/scripts/preview-deploy.sh" "$DEPLOY_HEAD" "$DEPLOY_ISSUE"
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          DEPLOY_HEAD: ${{ inputs.head }}
          DEPLOY_ISSUE: ${{ inputs.issue_number }}
          VPS_PATH: ${{ vars.VPS_REPO_PATH }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Set preview URL output
        id: set-url
        env:
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          PREVIEW_URL="https://preview-${ISSUE_NUM}.pscx.ai"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Verify preview is reachable
        run: |
          HEALTH="${{ needs.read-config.outputs.health_endpoint }}"
          URL="${{ steps.set-url.outputs.preview_url }}${HEALTH}"
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 "$URL" > /dev/null 2>&1; then
              echo "Preview reachable at $URL"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Preview not reachable at $URL"

  # ── Job 6: Run tests ───────────────────────────────────────────────
  test:
    name: "Test (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview]
    if: always() && !cancelled() && needs.read-config.outputs.test_command != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      tests_passed: ${{ steps.result.outputs.tests_passed }}

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Fallback to base
        if: steps.checkout.outcome != 'success'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run test command
        id: test
        continue-on-error: true
        env:
          TEST_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url || '' }}
        run: ${{ needs.read-config.outputs.test_command }}

      - name: Determine result
        id: result
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 7: Teardown preview ────────────────────────────────────────
  teardown-preview:
    name: "Teardown Preview (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview, test]
    if: always() && needs.deploy-preview.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.base == 'main' && 'production' || 'dev' }}

    steps:
      - name: Teardown preview on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_ISSUE,VPS_PATH
          script: |
            "$VPS_PATH/scripts/preview-teardown.sh" "$DEPLOY_ISSUE"
        env:
          DEPLOY_ISSUE: ${{ inputs.issue_number }}
          VPS_PATH: ${{ vars.VPS_REPO_PATH }}

  # ── Job 7.5: API-driven behavioral validation ──────────────────────
  # Runs Sentinel scenarios against the deployed preview. Emits a verdict
  # (unchanged | expected-diff | new-behavior | regression | skipped) and a
  # signed attestation that shadow-upstream-pr can verify without re-running.
  validate-api:
    name: "API Validate (#${{ inputs.issue_number }})"
    needs: [read-config, deploy-preview]
    if: |
      always() && !cancelled() &&
      needs.deploy-preview.result == 'success' &&
      needs.deploy-preview.outputs.preview_url != ''
    uses: ./.github/workflows/reusable-validate.yml
    with:
      preview_url: ${{ needs.deploy-preview.outputs.preview_url }}
      target_env: ${{ inputs.base == 'main' && 'production' || 'dev' }}
      issue_number: ${{ inputs.issue_number }}
    secrets:
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
      VALIDATION_ATTESTATION_KEY: ${{ secrets.VALIDATION_ATTESTATION_KEY }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

  # ── Job 8: Upsert PR and update labels ─────────────────────────────
  finalize:
    name: "Finalize (#${{ inputs.issue_number }})"
    needs: [rlm-fix, read-config, validate, preflight, test, validate-api]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout fix branch
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head }}
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch shared scripts
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/cloudwarriors-ai/.github.git /tmp/org-github

      - name: Build matrix
        if: always()
        id: matrix
        env:
          VALIDATION: ${{ needs.validate.outputs.validation_passed }}
          PREFLIGHT: ${{ needs.preflight.outputs.preflight_passed }}
          TESTS: ${{ needs.test.outputs.tests_passed || 'skip' }}
          API_VALIDATION: ${{ needs.validate-api.outputs.api_validation_passed || 'skip' }}
          API_VERDICT: ${{ needs.validate-api.outputs.verdict || 'skipped' }}
          ISSUE_NUM: ${{ inputs.issue_number }}
        run: |
          CONTRACT=$( [ "$VALIDATION" = "true" ] && echo "pass" || echo "fail" )
          INTEGRATION=$( [ "$PREFLIGHT" = "true" ] && echo "pass" || echo "fail" )

          npx tsx /tmp/org-github/scripts/autopilot/matrix.ts \
            --issue "$ISSUE_NUM" \
            --contract-result "$CONTRACT" \
            --integration-result "$INTEGRATION" \
            --e2e-result "$TESTS" \
            --smoke-result "skip" \
            --attempt 1 \
            --model "rlm"

      - name: Upsert PR
        if: steps.checkout.outcome == 'success'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          ISSUE_HEAD: ${{ inputs.head }}
          ISSUE_BASE: ${{ inputs.base }}
          ISSUE_TRACK: ${{ inputs.track }}
          TESTS_RESULT: ${{ needs.test.outputs.tests_passed || 'skipped' }}
          PREFLIGHT_RESULT: ${{ needs.preflight.outputs.preflight_passed || 'skipped' }}
          VALIDATION_RESULT: ${{ needs.validate.outputs.validation_passed || 'skipped' }}
          API_VALIDATION_RESULT: ${{ needs.validate-api.outputs.api_validation_passed || 'skipped' }}
          API_VERDICT: ${{ needs.validate-api.outputs.verdict || 'skipped' }}
        run: |
          EXISTING_PR=$(gh pr list --head "$ISSUE_HEAD" --base "$ISSUE_BASE" --json number --jq '.[0].number' 2>/dev/null || echo "")

          PR_BODY="$(cat <<PRBODY
          ## Autopilot Fix for Issue #${ISSUE_NUM}

          **Track:** ${ISSUE_TRACK} | **Base:** ${ISSUE_BASE}

          ### Linked Issue
          Closes #${ISSUE_NUM}

          ### How was this fixed?
          This fix was generated by the Autopilot pipeline using RLM (codebase analysis + Claude).
          - [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})

          ### Testing
          - Preflight: ${PREFLIGHT_RESULT}
          - Validation (bundle): ${VALIDATION_RESULT}
          - Validation (API — Sentinel): ${API_VALIDATION_RESULT} (verdict: ${API_VERDICT})
          - Tests: ${TESTS_RESULT}
          - [ ] Human review complete
          PRBODY
          )"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"
          else
            PR_URL=$(gh pr create \
              --head "$ISSUE_HEAD" \
              --base "$ISSUE_BASE" \
              --title "fix: resolve issue #${ISSUE_NUM}" \
              --body "$PR_BODY" \
              --label "autopilot") || true
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "")
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

      # --- Auto-merge if configured and all checks pass ---
      - name: Auto-merge
        if: |
          needs.read-config.outputs.auto_merge == 'true' &&
          needs.validate.outputs.validation_passed == 'true' &&
          needs.preflight.outputs.preflight_passed == 'true' &&
          (needs.test.outputs.tests_passed == 'true' || needs.test.outputs.tests_passed == '') &&
          (needs.validate-api.result == 'skipped' || needs.validate-api.outputs.api_validation_passed == 'true')
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
        run: |
          PR="${{ steps.pr.outputs.pr_number }}"
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --squash --auto || echo "Auto-merge failed — PR may need reviews"
          fi

      # --- Update issue labels ---
      - name: "On success: label In QA"
        if: |
          needs.validate.outputs.validation_passed == 'true' &&
          needs.preflight.outputs.preflight_passed == 'true' &&
          (needs.validate-api.result == 'skipped' || needs.validate-api.outputs.api_validation_passed == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }}, name: 'STATUS: In Progress',
              });
            } catch {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              labels: ['STATUS: In QA'],
            });

      - name: "On failure: label Follow-Up Required"
        if: |
          needs.validate.outputs.validation_passed != 'true' ||
          needs.preflight.outputs.preflight_passed != 'true' ||
          (needs.validate-api.result != 'skipped' && needs.validate-api.outputs.api_validation_passed != 'true')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: ${{ inputs.issue_number }}, name: 'STATUS: In Progress',
              });
            } catch {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              labels: ['STATUS: Follow-Up Required'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ inputs.issue_number }},
              body: [
                '### Autopilot — Follow-Up Required',
                '',
                `**Run:** [Workflow](${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                'This issue needs human attention. Check the workflow logs for details.',
              ].join('\n'),
            });
