name: Shadow Validate (Reusable)

# Validates a shadow fix branch before upstream PR promotion.
# Applies the shadow fix to a local source clone, spins up a preview container
# via docker compose (no VPS required), runs Sentinel API scenarios against
# localhost:9002, then tears down — producing a sentinel-validation-*
# attestation artifact that reusable-shadow-upstream-pr.yml verifies.
#
# Caller contract:
#   - shadow_repo must carry .shadow/config.json with sourceRepo + issueMap
#   - source repo must carry .autopilot/validation.json + validation/scenarios/

on:
  workflow_call:
    inputs:
      shadow_repo:
        description: 'Full shadow repo name (e.g. cloudwarriors-ai/project-pulse-shadow)'
        type: string
        required: true
      shadow_branch:
        description: 'Shadow fix branch (e.g. fix/issue-26)'
        type: string
        required: true
      shadow_pr_number:
        description: 'Shadow PR number (used to fetch the exact PR head commit)'
        type: number
        required: true
    secrets:
      WORKFLOW_PAT:
        required: false
      VALIDATION_ATTESTATION_KEY:
        required: false
    outputs:
      verdict:
        description: 'Sentinel verdict: unchanged | expected-diff | new-behavior | regression | skipped | error'
        value: ${{ jobs.shadow-validate.outputs.verdict }}
      api_validation_passed:
        description: 'false only when verdict is regression'
        value: ${{ jobs.shadow-validate.outputs.api_validation_passed }}

jobs:
  # Single job — preview container and Sentinel runner share the same CI host
  # so localhost:9002 is accessible without a VPS or SSH.
  shadow-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      verdict:             ${{ steps.emit.outputs.verdict }}
      api_validation_passed: ${{ steps.emit.outputs.api_validation_passed }}

    steps:
      # ── 1. Resolve mappings and PR base SHA ──────────────────────────────
      - name: Prepare mapping
        id: prepare
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const [shadowOwner, shadowRepoName] = '${{ inputs.shadow_repo }}'.split('/');
            const shadowBranch = '${{ inputs.shadow_branch }}';

            const branchMatch = shadowBranch.match(/fix\/issue-(\d+)/);
            if (!branchMatch) {
              core.setFailed(`Branch ${shadowBranch} does not match fix/issue-N pattern`);
              return;
            }
            const shadowIssueNumber = parseInt(branchMatch[1], 10);

            const { data: configFile } = await github.rest.repos.getContent({
              owner: shadowOwner,
              repo: shadowRepoName,
              path: '.shadow/config.json',
            });
            const config = JSON.parse(Buffer.from(configFile.content, 'base64').toString());
            const sourceRepo = config.sourceRepo;
            const [sourceOwner, sourceRepoName] = sourceRepo.split('/');

            const reverseMap = Object.fromEntries(
              Object.entries(config.issueMap || {}).map(([src, shad]) => [String(shad), Number(src)])
            );
            const sourceIssueNumber = reverseMap[String(shadowIssueNumber)] || shadowIssueNumber;

            const { data: sourceRepoData } = await github.rest.repos.get({
              owner: sourceOwner,
              repo: sourceRepoName,
            });
            const defaultBranch = sourceRepoData.default_branch;

            // Get the PR's base SHA so we diff only what the PR changed.
            const { data: prData } = await github.rest.pulls.get({
              owner: shadowOwner,
              repo: shadowRepoName,
              pull_number: ${{ inputs.shadow_pr_number }},
            });

            core.setOutput('shadow_issue_number', String(shadowIssueNumber));
            core.setOutput('source_issue_number', String(sourceIssueNumber));
            core.setOutput('source_repo', sourceRepo);
            core.setOutput('source_owner', sourceOwner);
            core.setOutput('source_repo_name', sourceRepoName);
            core.setOutput('default_branch', defaultBranch);
            core.setOutput('pr_base_sha', prData.base.sha);

      # ── 2. Clone source + shadow; apply fix diff ─────────────────────────
      - name: Fetch and patch source
        id: patch
        if: steps.prepare.outputs.source_repo != ''
        env:
          WORKFLOW_PAT:   ${{ secrets.WORKFLOW_PAT || github.token }}
          SOURCE_OWNER:   ${{ steps.prepare.outputs.source_owner }}
          SOURCE_REPO:    ${{ steps.prepare.outputs.source_repo_name }}
          DEFAULT_BRANCH: ${{ steps.prepare.outputs.default_branch }}
          PR_BASE_SHA:    ${{ steps.prepare.outputs.pr_base_sha }}
        run: |
          set -euo pipefail
          git config --global user.name  "Shadow Validator"
          git config --global user.email "claude-bot@anthropic.com"

          git clone --no-tags --branch "$DEFAULT_BRANCH" \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git" source
          git clone --no-tags \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${{ inputs.shadow_repo }}.git" shadow

          git -C shadow fetch origin "pull/${{ inputs.shadow_pr_number }}/head:shadow-pr-head"

          # Diff from PR's actual base SHA — captures only what the PR changed.
          git -C shadow diff --binary "${PR_BASE_SHA}...shadow-pr-head" \
            -- . \
            ':(exclude).shadow' \
            ':(exclude).github/workflows/claude-ci.yml' > /tmp/shadow-fix.patch

          if [ ! -s /tmp/shadow-fix.patch ]; then
            echo "::warning::No source-app changes in shadow PR — skipping validation"
            echo "patched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C source apply --index --3way /tmp/shadow-fix.patch

          if [ -z "$(git -C source status --porcelain)" ]; then
            echo "::warning::Patch produced no diff on source — skipping validation"
            echo "patched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "patched=true" >> "$GITHUB_OUTPUT"
          echo "=== Files changed by shadow fix ==="
          git -C source diff --stat HEAD

      # ── 3. Start preview container via docker compose ────────────────────
      - name: Start preview app
        id: start-app
        if: steps.patch.outputs.patched == 'true'
        working-directory: source
        run: |
          set -euo pipefail
          mkdir -p .cache/docker/node_modules .cache/docker/next .cache/npm

          export HOST_UID="$(id -u)"
          export HOST_GID="$(id -g)"
          export CI="true"
          export POSTGRES_USER="projectpulse"
          export POSTGRES_PASSWORD="projectpulse_dev_pass"
          export POSTGRES_DB="projectpulse_ci"
          export DATABASE_URL="postgresql://projectpulse:projectpulse_dev_pass@postgres:5432/projectpulse_ci"
          export BOOTSTRAP_MODE="auto"
          export BOOTSTRAP_BUILD="auto"
          export BOOTSTRAP_DB_PUSH="false"
          export BOOTSTRAP_DB_SYNC_MODE="migrate-deploy"
          export BOOTSTRAP_WAIT_FOR_DB="true"
          export AUTH_USE_SECURE_COOKIES="false"
          export AUTH_SECRET="shadow-validate-ci-secret"
          export NEXTAUTH_SECRET="shadow-validate-ci-secret"
          export NEXTAUTH_URL="http://localhost:9002"
          export NEXTAUTH_URL_INTERNAL="http://localhost:9002"
          export AUTH_URL="http://localhost:9002"
          export SURVEY_LINK_SIGNING_SECRET="shadow-validate-survey-secret"
          export RATE_LIMIT_DEV_MODE="true"
          export COMPOSE_PROJECT_NAME="shadow-validate-${{ github.run_id }}"
          # Keep the server running after bootstrap — do not run tests
          export PULSE_RUN_CMD="node .next/standalone/server.js"

          docker compose -f docker-compose.dev.yml --profile ci \
            up -d --build pulse-dev postgres

      # ── 4. Wait for the app to be healthy at localhost:9002 ──────────────
      - name: Wait for app healthy
        id: health
        if: steps.start-app.outcome == 'success'
        run: |
          echo "Polling http://localhost:9002/api/v1/health ..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://localhost:9002/api/v1/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "App healthy after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::App not healthy after 180s"
          docker compose -f source/docker-compose.dev.yml --profile ci \
            --project-name "shadow-validate-${{ github.run_id }}" \
            logs pulse-dev --tail 50 2>/dev/null || true
          exit 1

      # ── 5. Install Python + Sentinel ─────────────────────────────────────
      - name: Setup Python
        if: steps.health.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone and install Sentinel
        if: steps.health.outcome == 'success'
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.WORKFLOW_PAT || github.token }}@github.com/cloudwarriors-ai/sentinel.git \
            /tmp/sentinel
          pip install -e /tmp/sentinel

      - name: Fetch shared scripts
        if: steps.health.outcome == 'success'
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.WORKFLOW_PAT || github.token }}@github.com/cloudwarriors-ai/.github.git \
            /tmp/org-github
          cd /tmp/org-github/scripts/autopilot && npm install --silent --no-audit --no-fund

      # ── 6. Check validation state ─────────────────────────────────────────
      - name: Check validation state
        id: state
        if: steps.health.outcome == 'success'
        env:
          CONFIG_PATH:   source/.autopilot/config.json
          MANIFEST_PATH: source/.autopilot/validation.json
        run: |
          set -euo pipefail
          RUN=true
          STATE="active"

          if [ -f "$CONFIG_PATH" ]; then
            STATE=$(jq -r '.validation.state // "active"' "$CONFIG_PATH" 2>/dev/null || echo "active")
            REASON=$(jq -r '.validation.reason // ""' "$CONFIG_PATH" 2>/dev/null || echo "")
            TTL=$(jq -r '.validation.ttl_until // ""' "$CONFIG_PATH" 2>/dev/null || echo "")
          fi

          case "$STATE" in
            active)
              [ -f "$MANIFEST_PATH" ] || { echo "::error::validation.state=active but manifest missing"; exit 1; }
              ;;
            pending_onboarding|exempt)
              [ -n "${TTL:-}" ] && [ -n "${REASON:-}" ] || { echo "::error::state=$STATE requires ttl_until + reason"; exit 1; }
              NOW=$(date -u +%s)
              TTL_TS=$(date -u -d "$TTL" +%s 2>/dev/null || echo 0)
              [ "$TTL_TS" -gt "$NOW" ] || { echo "::error::state=$STATE ttl_until expired ($TTL)"; exit 1; }
              RUN=false
              ;;
            *)
              echo "::error::unknown validation.state='$STATE'"; exit 1 ;;
          esac

          echo "state=$STATE" >> "$GITHUB_OUTPUT"
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      # ── 7. Run Sentinel against localhost:9002 ────────────────────────────
      - name: Run Sentinel validation
        id: run
        if: steps.state.outputs.run == 'true'
        env:
          PREVIEW_URL:   http://localhost:9002
          MANIFEST_PATH: source/.autopilot/validation.json
        run: |
          set -uo pipefail
          mkdir -p /tmp/sentinel-run

          set +e
          sentinel validate-api \
            --manifest "$MANIFEST_PATH" \
            --target "$PREVIEW_URL" \
            --out /tmp/sentinel-run \
            --json > /tmp/sentinel-run/summary.json 2>/tmp/sentinel-run/stderr.log
          EXIT=$?
          set -e

          echo "sentinel exit: $EXIT"
          [ -s /tmp/sentinel-run/stderr.log ] && cat /tmp/sentinel-run/stderr.log || true

          [ -f /tmp/sentinel-run/report.json ] || { echo "::error::report.json missing"; exit 2; }
          VERDICT=$(jq -r .run_verdict /tmp/sentinel-run/report.json)
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      # ── 8. Sign attestation ───────────────────────────────────────────────
      - name: Sign attestation
        if: steps.run.outputs.verdict != ''
        env:
          VALIDATION_ATTESTATION_KEY: ${{ secrets.VALIDATION_ATTESTATION_KEY }}
          VERDICT: ${{ steps.run.outputs.verdict }}
          MANIFEST_PATH: source/.autopilot/validation.json
        run: |
          MANIFEST_SHA=$(git -C source rev-parse HEAD)
          SOURCE_REPO="${{ steps.prepare.outputs.source_repo }}"
          cd /tmp/org-github/scripts/autopilot
          npx tsx validation/attestation.ts sign \
            --report /tmp/sentinel-run/report.json \
            --manifest "$GITHUB_WORKSPACE/$MANIFEST_PATH" \
            --commit-sha "$MANIFEST_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --repo "$SOURCE_REPO" \
            --verdict "$VERDICT" \
            --out /tmp/sentinel-run/attestation.json

      # ── 9. Emit outputs (always) ──────────────────────────────────────────
      - name: Emit outputs
        id: emit
        if: always()
        env:
          STATE:   ${{ steps.state.outputs.state }}
          VERDICT: ${{ steps.run.outputs.verdict }}
          PATCHED: ${{ steps.patch.outputs.patched }}
        run: |
          # No app changes to validate — upstream-pr can proceed.
          if [ "$PATCHED" != "true" ]; then
            echo "verdict=skipped" >> "$GITHUB_OUTPUT"
            echo "api_validation_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$STATE" = "pending_onboarding" ] || [ "$STATE" = "exempt" ]; then
            echo "verdict=skipped" >> "$GITHUB_OUTPUT"
            echo "api_validation_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${VERDICT:-}" ]; then
            echo "verdict=error" >> "$GITHUB_OUTPUT"
            echo "api_validation_passed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          if [ "$VERDICT" = "regression" ]; then
            echo "api_validation_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "api_validation_passed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/sentinel-run/
          retention-days: 90
          if-no-files-found: ignore

      # ── 11. Teardown (always) ─────────────────────────────────────────────
      - name: Teardown preview container
        if: always() && steps.start-app.outcome != 'skipped'
        working-directory: source
        env:
          COMPOSE_PROJECT_NAME: shadow-validate-${{ github.run_id }}
        run: |
          docker compose -f docker-compose.dev.yml --profile ci \
            down -v --remove-orphans 2>/dev/null || true

      # ── 12. Fail step if regression ───────────────────────────────────────
      - name: Fail if regression
        if: steps.emit.outputs.api_validation_passed == 'false'
        run: |
          echo "::error::Sentinel verdict=${{ steps.emit.outputs.verdict }} — upstream PR blocked"
          exit 1
