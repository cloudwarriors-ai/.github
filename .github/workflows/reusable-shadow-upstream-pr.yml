name: Shadow Upstream PR (Reusable)

# Opens a PR on the source repo after a fix merges in the shadow repo.
# Reads .shadow/config.json to find the source repo.

on:
  workflow_call:
    inputs:
      shadow_repo:
        description: 'Shadow repo full name (e.g. cloudwarriors-ai/cloudflow-shadow)'
        type: string
        required: true
      shadow_pr_number:
        description: 'PR number in shadow repo that was merged'
        type: number
        required: true
      shadow_branch:
        description: 'Branch that was merged (e.g. fix/issue-7)'
        type: string
        required: true

jobs:
  upstream-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Open upstream PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const [shadowOwner, shadowRepoName] = '${{ inputs.shadow_repo }}'.split('/');
            const shadowPrNumber = ${{ inputs.shadow_pr_number }};
            const shadowBranch = '${{ inputs.shadow_branch }}';

            // Extract shadow issue number from branch name (fix/issue-N)
            const branchMatch = shadowBranch.match(/fix\/issue-(\d+)/);
            if (!branchMatch) {
              core.warning(`Branch ${shadowBranch} does not match fix/issue-N pattern; skipping upstream PR`);
              return;
            }
            const shadowIssueNumber = parseInt(branchMatch[1], 10);

            // ── 1. Read .shadow/config.json ──────────────────────────────────
            const { data: configFile } = await github.rest.repos.getContent({
              owner: shadowOwner,
              repo: shadowRepoName,
              path: '.shadow/config.json',
            });
            const config = JSON.parse(Buffer.from(configFile.content, 'base64').toString());
            const [sourceOwner, sourceRepoName] = config.sourceRepo.split('/');

            // Reverse-lookup: shadow issue number → source issue number
            const reverseMap = Object.fromEntries(
              Object.entries(config.issueMap || {}).map(([src, shad]) => [String(shad), Number(src)])
            );
            const sourceIssueNumber = reverseMap[String(shadowIssueNumber)] || shadowIssueNumber;

            // ── 2. Get merged shadow PR details ──────────────────────────────
            const { data: shadowPr } = await github.rest.pulls.get({
              owner: shadowOwner,
              repo: shadowRepoName,
              pull_number: shadowPrNumber,
            });

            // ── 3. Get source repo default branch ────────────────────────────
            const { data: sourceRepoData } = await github.rest.repos.get({
              owner: sourceOwner,
              repo: sourceRepoName,
            });
            const defaultBranch = sourceRepoData.default_branch;

            // Store values for the shell step
            core.exportVariable('SOURCE_OWNER', sourceOwner);
            core.exportVariable('SOURCE_REPO', sourceRepoName);
            core.exportVariable('SHADOW_BRANCH', shadowBranch);
            core.exportVariable('SHADOW_BASE_BRANCH', shadowPr.base.ref || 'main');
            core.exportVariable('UPSTREAM_BRANCH', `shadow-fix-${sourceIssueNumber}`);
            core.exportVariable('DEFAULT_BRANCH', defaultBranch);
            core.exportVariable('SHADOW_PR_TITLE', shadowPr.title);
            core.exportVariable('SOURCE_ISSUE_NUMBER', String(sourceIssueNumber));

      - name: Export fix branch to source repo
        id: export
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          set -euo pipefail
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude-bot@anthropic.com"

          git clone --no-tags --branch "$DEFAULT_BRANCH" \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git" source
          git clone --no-tags \
            "https://x-access-token:${WORKFLOW_PAT}@github.com/${{ inputs.shadow_repo }}.git" shadow

          git -C shadow fetch origin "$SHADOW_BASE_BRANCH"
          git -C shadow fetch origin "pull/${{ inputs.shadow_pr_number }}/head:shadow-pr-head"
          git -C source checkout -b "$UPSTREAM_BRANCH" "origin/$DEFAULT_BRANCH"

          git -C shadow diff --binary "origin/$SHADOW_BASE_BRANCH...shadow-pr-head" \
            -- . \
            ':(exclude).shadow' \
            ':(exclude).github/workflows/claude-ci.yml' > /tmp/shadow-fix.patch

          if [ ! -s /tmp/shadow-fix.patch ]; then
            echo "::warning::No source-app changes to export after excluding shadow control files"
            echo "exported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C source apply --index --3way /tmp/shadow-fix.patch

          if [ -z "$(git -C source status --porcelain)" ]; then
            echo "::warning::Patch exported no source changes after apply"
            echo "exported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C source commit -m "fix: automated fix for issue #${SOURCE_ISSUE_NUMBER}"
          git -C source push origin "HEAD:${UPSTREAM_BRANCH}" --force-with-lease

          echo "exported=true" >> "$GITHUB_OUTPUT"
          echo "Exported ${SHADOW_BRANCH} -> ${SOURCE_OWNER}/${SOURCE_REPO}:${UPSTREAM_BRANCH}"

      - name: Create PR on source repo
        if: steps.export.outputs.exported == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const sourceOwner = process.env.SOURCE_OWNER;
            const sourceRepoName = process.env.SOURCE_REPO;
            const upstreamBranch = process.env.UPSTREAM_BRANCH;
            const defaultBranch = process.env.DEFAULT_BRANCH;
            const sourceIssueNumber = process.env.SOURCE_ISSUE_NUMBER;

            const prBody = [
              `## Automated Fix`,
              ``,
              `This PR was generated by the CloudWarriors AI shadow system.`,
              ``,
              `**Source issue:** #${sourceIssueNumber}`,
              `**Shadow repo:** ${{ inputs.shadow_repo }}`,
              `**Shadow PR:** ${{ inputs.shadow_repo }}#${{ inputs.shadow_pr_number }}`,
              ``,
              `---`,
              `🤖 Automated via [CloudWarriors Shadow Autopilot](https://github.com/cloudwarriors-ai/.github)`,
            ].join('\n');

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: sourceOwner,
                repo: sourceRepoName,
                title: `fix: automated fix for issue #${sourceIssueNumber} (via shadow)`,
                head: upstreamBranch,
                base: defaultBranch,
                body: prBody,
              });
              console.log(`Upstream PR created: ${pr.html_url}`);

              await core.summary
                .addRaw(`### Upstream PR Created\n\n**PR:** [${pr.title}](${pr.html_url})\n**Source issue:** ${sourceOwner}/${sourceRepoName}#${sourceIssueNumber}`)
                .write();
            } catch (e) {
              console.log(`::warning::Could not create upstream PR: ${e.message}`);
            }
