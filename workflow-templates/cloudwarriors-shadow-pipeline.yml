name: Shadow Pipeline

# Installed in cloudwarriors-ai shadow repos.
#
# Operator contract:
# - AUTOFIX: Ready on a shadow issue triggers the autopilot pipeline.
# - Source repo does NOT execute autofix — shadow repo is the sole execution path.
# - Shadow runner runs the full pipeline: RLM fix, validate, preflight, preview deploy,
#   Sentinel (validate-api), and finalize. PR is only opened when required gates pass.
# - autoMerge: true in .autopilot/config.json causes the runner to auto-merge the
#   shadow fix PR immediately after opening it (all gates already passed in-runner).
# - After merge, upstream-pr promotes the validated diff to the source repo.
# - Source issue is updated with shadow issue, shadow PR, and upstream PR links.
#
# AUTOQUEUE_ENABLED repo variable (set in shadow repo Settings → Actions → Variables):
#   true  — issue sync automatically stamps AUTOFIX: Ready on shadow issues where source has it
#   false — issues sync clean; human or agent manually labels to trigger

on:
  issues:
    types: [labeled]

  issue_comment:
    types: [created]

  schedule:
    - cron: '15 * * * *'

  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run: full-sync | sync-code | sync-issues'
        type: string
        default: 'full-sync'

jobs:

  # ── Autofix trigger ──────────────────────────────────────────────────────────
  # AUTOFIX: Ready label → intake resolves context and dispatches autopilot-runner.yml.
  # The runner runs the full pipeline: fix, validate, preflight, preview deploy,
  # Sentinel validation, finalize. PR is opened only when required gates pass.
  # autoMerge: true in config causes the runner to merge the PR immediately after.
  # Manual @claude comment is also accepted for one-off runs.
  handle-issue:
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'AUTOFIX: Ready') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-intake.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit

  # ── Code sync ────────────────────────────────────────────────────────────────
  # Keep mirrored application code in parity with the source repo.
  sync-code:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-code'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-code-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
    secrets: inherit

  # ── Issue sync ───────────────────────────────────────────────────────────────
  # Sync issues from source repo. Respects AUTOQUEUE_ENABLED to control whether
  # AUTOFIX: Ready is automatically stamped on matching shadow issues.
  sync-issues:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-issues'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
      autoqueue_enabled: ${{ vars.AUTOQUEUE_ENABLED || 'false' }}
    secrets: inherit

  # ── Upstream PR promotion ────────────────────────────────────────────────────
  # After the shadow fix PR merges (auto-merged by runner after all gates pass),
  # export the validated diff to the source repo as an upstream PR.
  # upstream-pr locates the Sentinel attestation artifact by head SHA — it finds
  # the one produced by the runner's validate-api job in the same run that opened
  # and merged the shadow PR.
  upstream-pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-')
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-upstream-pr.yml@main
    with:
      shadow_repo:                    ${{ github.repository }}
      shadow_pr_number:               ${{ github.event.pull_request.number }}
      shadow_branch:                  ${{ github.event.pull_request.head.ref }}
      source_issue_notification_mode: 'comment'
      source_pr_review_mode:          'advisory'
    secrets: inherit
