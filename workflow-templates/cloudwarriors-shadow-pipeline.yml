name: Shadow Pipeline

# Installed in cloudwarriors-ai shadow repos.
#
# Operator contract:
# - AUTOFIX: Ready on a shadow issue is the automation trigger (added by sync when AUTOQUEUE_ENABLED=true,
#   or manually added by a human/agent).
# - Source repo does NOT execute autofix — shadow repo is the sole execution path.
# - Sentinel validation runs PRE-merge (Docker-based, no VPS required).
# - A shadow fix PR merges only after Sentinel passes.
# - After merge, upstream-pr opens a PR on the source repo from the validated diff.
# - Source issue is updated with shadow issue, shadow PR, validation status, and upstream PR links.
#
# AUTOQUEUE_ENABLED repo variable (set in shadow repo Settings → Actions → Variables):
#   true  — issue sync automatically stamps AUTOFIX: Ready on shadow issues where source has it
#   false — issues sync clean; human or agent manually labels to trigger

on:
  issues:
    types: [labeled]

  issue_comment:
    types: [created]

  schedule:
    - cron: '15 * * * *'

  pull_request:
    types: [opened, synchronize, closed]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run: full-sync | sync-code | sync-issues'
        type: string
        default: 'full-sync'

jobs:

  # ── Autofix trigger ──────────────────────────────────────────────────────────
  # AUTOFIX: Ready label → intake resolves context and dispatches autopilot-runner.yml.
  # Manual @claude comment is also accepted for one-off runs.
  handle-issue:
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'AUTOFIX: Ready') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-intake.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit

  # ── Code sync ────────────────────────────────────────────────────────────────
  # Keep mirrored application code in parity with the source repo.
  sync-code:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-code'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-code-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
    secrets: inherit

  # ── Issue sync ───────────────────────────────────────────────────────────────
  # Sync issues from source repo. Respects AUTOQUEUE_ENABLED to control whether
  # AUTOFIX: Ready is automatically stamped on matching shadow issues.
  sync-issues:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-issues'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
      autoqueue_enabled: ${{ vars.AUTOQUEUE_ENABLED || 'false' }}
    secrets: inherit

  # ── Pre-merge validation ─────────────────────────────────────────────────────
  # Runs Sentinel against a Docker preview of the fix before the shadow PR can merge.
  # Produces the sentinel-validation-* attestation artifact that upstream-pr verifies.
  # Triggered on PR open and re-run on any new push to the fix branch.
  shadow-validate:
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-')
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-validate.yml@main
    with:
      shadow_repo:      ${{ github.repository }}
      shadow_branch:    ${{ github.event.pull_request.head.ref }}
      shadow_pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # ── Merge shadow PR after Sentinel passes ────────────────────────────────────
  # Squash-merges the fix PR only when shadow-validate reports api_validation_passed=true.
  # Skipped verdicts (no app changes, validation exempt) are treated as pass.
  merge-shadow-pr:
    needs: shadow-validate
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-') &&
      needs.shadow-validate.result == 'success' &&
      needs.shadow-validate.outputs.api_validation_passed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge shadow PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
            });

            if (pr.data.state !== 'open') {
              console.log(`PR #${{ github.event.pull_request.number }} is already ${pr.data.state} — skipping merge`);
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ github.event.pull_request.number }},
              merge_method: 'squash',
              commit_title: `fix: shadow autofix for ${{ github.event.pull_request.head.ref }}`,
            });
            console.log(`Shadow PR #${{ github.event.pull_request.number }} merged — Sentinel validation passed`);

  # ── Upstream PR promotion ────────────────────────────────────────────────────
  # After the shadow fix PR merges, export the validated diff to the source repo
  # as an upstream PR. upstream-pr locates the attestation artifact by head SHA,
  # so it finds the one produced by shadow-validate (pre-merge, different run).
  upstream-pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-')
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-upstream-pr.yml@main
    with:
      shadow_repo:                    ${{ github.repository }}
      shadow_pr_number:               ${{ github.event.pull_request.number }}
      shadow_branch:                  ${{ github.event.pull_request.head.ref }}
      source_issue_notification_mode: 'comment'
      source_pr_review_mode:          'advisory'
    secrets: inherit
