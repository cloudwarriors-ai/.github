name: Shadow Pipeline

# Installed in cloudwarriors-ai shadow repos.
#
# Operator contract:
# - AUTOFIX: Ready on a shadow issue triggers the autopilot pipeline.
# - Source repo does NOT execute autofix — shadow repo is the sole execution path.
# - Shadow runner runs the full pipeline: RLM fix, validate, preflight, preview deploy,
#   Sentinel (validate-api), and finalize. PR is only opened when required gates pass.
# - autoMerge: true in .autopilot/config.json causes the runner to auto-merge the
#   shadow fix PR immediately after opening it (all gates already passed in-runner).
# - After merge, upstream-pr promotes the validated diff to the source repo.
# - Source issue is updated with shadow issue, shadow PR, and upstream PR links.
#
# AUTOQUEUE_ENABLED repo variable (set in shadow repo Settings → Actions → Variables):
#   true  — issue sync automatically stamps AUTOFIX: Ready on shadow issues where source has it
#   false — issues sync clean; human or agent manually labels to trigger
#
# AUTOPILOT_QUEUE_AGENT_ENABLED repo variable:
#   true  — scheduled runs may promote source issues from AUTOPILOT: Queue into AUTOFIX: Ready
#   false — manual agent-run still works, but scheduled runs only sync/drain existing Ready items

on:
  issues:
    types: [labeled]

  issue_comment:
    types: [created]

  schedule:
    - cron: '15 * * * *'

  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run: full-sync | sync-code | sync-issues | drain-queue | agent-run | agent-dry-run'
        type: string
        default: 'full-sync'

jobs:

  # ── Autofix trigger ──────────────────────────────────────────────────────────
  # AUTOFIX: Ready label → intake resolves context and dispatches autopilot-runner.yml.
  # The runner runs the full pipeline: fix, validate, preflight, preview deploy,
  # Sentinel validation, finalize. PR is opened only when required gates pass.
  # autoMerge: true in config causes the runner to merge the PR immediately after.
  # Manual @claude comment is also accepted for one-off runs.
  handle-issue:
    if: >
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'AUTOFIX: Ready') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-intake.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets: inherit

  # ── Code sync ────────────────────────────────────────────────────────────────
  # Keep mirrored application code in parity with the source repo.
  sync-code:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-code'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-code-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
    secrets: inherit

  # ── Source queue agent ──────────────────────────────────────────────────────
  # Keeps the shadow runner fed without exceeding the 5-runner cap. In the safe
  # default mode, it only promotes source issues that humans marked
  # AUTOPILOT: Queue. Promotion means adding AUTOFIX: Ready plus a TRACK label
  # on the source issue; sync-issues then mirrors that state to shadow.
  queue-agent:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == 'agent-run' ||
        github.event.inputs.action == 'agent-dry-run'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-queue-agent.yml@main
    with:
      shadow_repo: ${{ github.repository }}
      enabled: "${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'agent-run' || github.event.inputs.action == 'agent-dry-run')) && 'true' || vars.AUTOPILOT_QUEUE_AGENT_ENABLED || 'false' }}"
      dry_run: "${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'agent-dry-run') && 'true' || vars.AUTOPILOT_QUEUE_AGENT_DRY_RUN || 'false' }}"
      max_concurrent: ${{ fromJSON(vars.AUTOPILOT_QUEUE_AGENT_MAX_CONCURRENT || '5') }}
      target_queue_depth: ${{ fromJSON(vars.AUTOPILOT_QUEUE_AGENT_TARGET_QUEUE_DEPTH || '10') }}
      batch_size: ${{ fromJSON(vars.AUTOPILOT_QUEUE_AGENT_BATCH_SIZE || '5') }}
      pool_mode: "${{ vars.AUTOPILOT_QUEUE_AGENT_POOL_MODE || 'queued' }}"
      queue_label: "${{ vars.AUTOPILOT_QUEUE_AGENT_QUEUE_LABEL || 'AUTOPILOT: Queue' }}"
      allowed_priority_labels: "${{ vars.AUTOPILOT_QUEUE_AGENT_ALLOWED_PRIORITIES || 'priority: low,P3: backlog,priority: medium,P2: post-launch' }}"
      excluded_labels: "${{ vars.AUTOPILOT_QUEUE_AGENT_EXCLUDED_LABELS || 'AUTOPILOT: Disabled,AUTOPILOT: Skip,needs-decision,question,P0: ship-blocker,priority: critical,Prod Released,STATUS: In Progress,STATUS: In QA,STATUS: Follow-Up Required,STATUS: Done,STATUS: Failed' }}"
    secrets: inherit

  # ── Issue sync ───────────────────────────────────────────────────────────────
  # Sync issues from source repo. Respects AUTOQUEUE_ENABLED to control whether
  # AUTOFIX: Ready is automatically stamped on matching shadow issues.
  sync-issues:
    needs: [queue-agent]
    if: >
      always() &&
      (needs.queue-agent.result == 'success' || needs.queue-agent.result == 'skipped') &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.action == '' ||
         github.event.inputs.action == 'full-sync' ||
         github.event.inputs.action == 'sync-issues' ||
         github.event.inputs.action == 'agent-run' ||
         github.event.inputs.action == 'agent-dry-run')))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
      autoqueue_enabled: ${{ vars.AUTOQUEUE_ENABLED || 'false' }}
    secrets: inherit

  # ── Queue drain ─────────────────────────────────────────────────────────────
  # Lets shadow repos keep more than 5 issues marked AUTOFIX: Ready. When a
  # runner slot opens, this job comments @claude on the oldest eligible queued
  # issue(s), reusing the existing intake path instead of duplicating dispatch.
  drain-autofix-queue:
    needs: [sync-issues]
    if: >
      always() &&
      (needs.sync-issues.result == 'success' || needs.sync-issues.result == 'skipped') &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.action == '' ||
         github.event.inputs.action == 'full-sync' ||
         github.event.inputs.action == 'sync-issues' ||
         github.event.inputs.action == 'drain-queue' ||
         github.event.inputs.action == 'agent-run'))))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-queue-drain.yml@main
    with:
      target_repo: ${{ github.repository }}
      max_concurrent: 5
      batch_size: 5
      settle_seconds: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'drain-queue' && 0 || 120 }}
    secrets: inherit

  # ── Upstream PR promotion ────────────────────────────────────────────────────
  # After the shadow fix PR merges (auto-merged by runner after all gates pass),
  # export the validated diff to the source repo as an upstream PR.
  # upstream-pr locates the Sentinel attestation artifact by head SHA — it finds
  # the one produced by the runner's validate-api job in the same run that opened
  # and merged the shadow PR.
  upstream-pr:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'fix/issue-') ||
       startsWith(github.event.pull_request.head.ref, 'autofix/issue-'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-upstream-pr.yml@main
    with:
      shadow_repo:                    ${{ github.repository }}
      shadow_pr_number:               ${{ github.event.pull_request.number }}
      shadow_branch:                  ${{ github.event.pull_request.head.ref }}
      source_issue_notification_mode: 'comment'
      source_pr_review_mode:          'advisory'
    secrets: inherit
