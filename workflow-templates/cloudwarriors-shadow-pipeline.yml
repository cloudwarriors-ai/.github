name: Shadow Pipeline

# Installed in cloudwarriors-ai shadow repos.
# Operator contract:
# - @claude on a shadow issue is the default human kickoff path.
# - AUTOFIX: Ready on a shadow issue is the explicit automation/queue trigger.
# - New source issues sync into shadow but do not auto-run unless one of those triggers is used.
# - Nothing is pushed back to the source repo until a shadow fix PR merges.
# - A merged shadow fix opens an upstream source PR, comments on the source issue, and can run advisory PR review.
# - When a fix/issue-N PR merges, validate-fix runs FIRST (deploy preview + Sentinel), then upstream-pr
#   runs in the same workflow run — so the attestation artifact is always findable by upstream-pr's lookup.

on:
  issues:
    types: [labeled]

  issue_comment:
    types: [created]

  schedule:
    - cron: '15 * * * *'

  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run: full-sync | sync-code | sync-issues'
        type: string
        default: 'full-sync'

jobs:

  # @claude is the default human trigger. AUTOFIX: Ready is the explicit automation path.
  handle-issue:
    if: >
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'AUTOFIX: Ready')
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-claude-issue-handler.yml@main
    with:
      target_branch: ${{ github.event.repository.default_branch }}
      node_version: '22'
      install_command: 'npm ci'
      lint_command: 'skip'
      test_command: 'skip'
      build_command: 'skip'
    secrets: inherit

  # Keep mirrored application code in parity with the source repo.
  sync-code:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-code'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-code-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
    secrets: inherit

  # Scheduled issue sync from source repo + manual dispatch.
  sync-issues:
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == '' ||
        github.event.inputs.action == 'full-sync' ||
        github.event.inputs.action == 'sync-issues'))
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-sync.yml@main
    with:
      shadow_repo: ${{ github.repository }}
    secrets: inherit

  # Resolve shadow issue number from the merged fix branch name.
  # Runs on the same closed+merged event as validate-fix and upstream-pr.
  resolve-for-validate:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-')
    runs-on: ubuntu-latest
    outputs:
      shadow_issue_number: ${{ steps.resolve.outputs.shadow_issue_number }}
    steps:
      - name: Resolve issue number from branch
        id: resolve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const branch = '${{ github.event.pull_request.head.ref }}';
            const match = branch.match(/fix\/issue-(\d+)/);
            if (!match) {
              core.setFailed(`Cannot extract issue number from branch: ${branch}`);
              return;
            }
            core.setOutput('shadow_issue_number', match[1]);

  # Deploy preview + Sentinel validation on the merged fix — produces the
  # sentinel-validation-* attestation artifact that upstream-pr verifies.
  # Runs in the same workflow run as upstream-pr so the artifact is immediately
  # findable via listWorkflowRunArtifacts on this run's ID.
  validate-fix:
    needs: resolve-for-validate
    if: needs.resolve-for-validate.result == 'success'
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-validate.yml@main
    with:
      shadow_repo:      ${{ github.repository }}
      shadow_branch:    ${{ github.event.pull_request.head.ref }}
      shadow_pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  # Open upstream PR after validate-fix completes (success or failure).
  # upstream-pr's attestation lookup will find the artifact from validate-fix
  # (same run → same head_sha → artifact visible via listWorkflowRunArtifacts).
  # Uses always() so it runs even when validate-fix fails — the attestation
  # check inside reusable-shadow-upstream-pr.yml is the fail-closed gate.
  upstream-pr:
    needs: [resolve-for-validate, validate-fix]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'fix/issue-') &&
      needs.resolve-for-validate.result == 'success'
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-shadow-upstream-pr.yml@main
    with:
      shadow_repo: ${{ github.repository }}
      shadow_pr_number: ${{ github.event.pull_request.number }}
      shadow_branch: ${{ github.event.pull_request.head.ref }}
      source_issue_notification_mode: 'comment'
      source_pr_review_mode: 'advisory'
    secrets: inherit
