name: "Autopilot: Runner"

# Deployed into shadow repos by reusable-shadow-code-sync.yml.
# Receives dispatch from reusable-autopilot-intake.yml and delegates to the
# shared reusable runner. Shadow repos disable VPS preview deploy via
# .autopilot/config.json (previewDeploy: false) — Sentinel validation runs
# pre-merge via the shadow-validate job in the shadow pipeline instead.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: string
      issue_title:
        description: 'Issue title (for context)'
        required: false
        type: string
        default: ''
      track:
        description: 'Track: bugs or features'
        required: true
        type: string
      base:
        description: 'Base branch'
        required: true
        type: string
      head:
        description: 'Head branch (autofix/issue-<id>)'
        required: true
        type: string
      claude_provider:
        description: 'Claude Code provider: openrouter or anthropic'
        required: false
        type: string
        default: ''
      rlm_model:
        description: 'OpenRouter model for RLM analysis'
        required: false
        type: string
        default: ''
      scout_model:
        description: 'Optional Claude Code model for scout/packet stages'
        required: false
        type: string
        default: ''
      claude_model:
        description: 'Claude Code writer model'
        required: false
        type: string
        default: ''
      max_claude_turns:
        description: 'Max turns for the writer'
        required: false
        type: string
        default: ''
      max_rlm_cost:
        description: 'Max cost for RLM analysis'
        required: false
        type: string
        default: ''

jobs:
  run:
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-autopilot-runner.yml@main
    with:
      issue_number: ${{ github.event.inputs.issue_number }}
      issue_title:  ${{ github.event.inputs.issue_title }}
      track:        ${{ github.event.inputs.track }}
      base:         ${{ github.event.inputs.base }}
      head:         ${{ github.event.inputs.head }}
      claude_provider:   ${{ github.event.inputs.claude_provider || vars.AUTOPILOT_CLAUDE_PROVIDER || 'openrouter' }}
      rlm_model:         ${{ github.event.inputs.rlm_model || vars.AUTOPILOT_RLM_MODEL || 'anthropic/claude-sonnet-4.6' }}
      scout_model:       ${{ github.event.inputs.scout_model || vars.AUTOPILOT_SCOUT_MODEL || '' }}
      claude_model:      ${{ github.event.inputs.claude_model || vars.AUTOPILOT_CLAUDE_MODEL || 'anthropic/claude-opus-4.6' }}
      max_claude_turns:  ${{ fromJSON(github.event.inputs.max_claude_turns || vars.AUTOPILOT_MAX_CLAUDE_TURNS || '60') }}
      max_rlm_cost:      ${{ fromJSON(github.event.inputs.max_rlm_cost || vars.AUTOPILOT_MAX_RLM_COST || '2') }}
    secrets: inherit
