name: Claude Auto-Fix

# DEPRECATED (2026-06-12). This template wires up the on-demand "@claude on an
# issue" autofix that runs in the SOURCE repo and bypasses the shadow flow —
# not desired behavior. Its reusable target (cloudwarriors-ai/.github
# reusable-claude-autofix-rlm.yml) has been removed; the canonical engine now
# lives in cloudwarriors-ai/workflows and is driven by the autopilot intake ->
# runner (shadow) flow. Do not adopt this template. Trigger disabled.
on:
  # issue_comment:   # was: @claude comment in a source repo (bypasses shadow)
  #   types: [created]
  workflow_dispatch: {}

jobs:
  trigger-autofix:
    # Only run on issue comments (not PR comments) that contain @claude
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude')
    uses: cloudwarriors-ai/.github/.github/workflows/reusable-claude-autofix-rlm.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
      # Optional: Customize these if needed
      # max_rlm_cost: 5
      # max_claude_turns: 60
      # rlm_model: 'anthropic/claude-sonnet-4.6'     # OpenRouter provider/model ID
      # claude_model: 'anthropic/claude-opus-4.6'    # OpenRouter provider/model ID
    secrets: inherit
